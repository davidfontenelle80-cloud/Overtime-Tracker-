<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description" content="Overtime Tracker — UConn Facilities OT equalization tracker." />
  <meta name="theme-color" content="#0a0a0a" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Time Tracker" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/dark-mode.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="stylesheet" href="css/main.css" />
  <title>Overtime Tracker</title>
</head>
<body>

  <!-- KHub: Skip link (WCAG 2.2) -->
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <!-- KHub: Update notice -->
  <div id="update-notice"
       class="update-notice"
       role="status"
       aria-live="polite"
       aria-atomic="true"
       hidden>
    Update available — <button class="btn btn-sm btn-secondary"
            onclick="KHub.SW.applyUpdate()">Refresh</button>
  </div>

  <!-- KHub: Error boundary -->
  <div id="error-boundary"
       class="error-boundary"
       role="alert"
       aria-live="assertive"
       aria-atomic="true"
       tabindex="-1"
       hidden>
    <strong>Something went wrong</strong>
    <p id="error-message"></p>
    <button class="btn btn-sm btn-danger"
            onclick="KHub.ErrorBoundary.dismiss()">Dismiss</button>
  </div>

  <!-- App content -->
  <div id="main-content" role="main">
<div class="app">
  <div class="container">
    <div class="header">
      <div>
        <div class="greeting" id="greeting">Good evening, David</div>
        <h1>Time Tracker</h1>
      </div>
      <div class="header-buttons">
        <button class="icon-btn" id="themeBtn" aria-label="Theme"></button>
        <button class="icon-btn" id="settingsBtn" aria-label="Settings"></button>
      </div>
    </div>
    <div id="content"></div>
  </div>
  <div class="nav"><div class="nav-inner" id="nav"></div></div>
  <div id="panel"></div>
  <div id="modal"></div>
  <div id="toast"></div>
  <input type="file" id="fileInput" accept=".json" style="display:none">
</div>
  </div>

  <!-- Firebase SDK (compat — no build step required) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <!-- JS load order -->
  <script src="js/config.js"></script>
  <script src="js/firebase/firebase-config.js"></script>
  <script src="js/firebase/cloud-backup.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/error-boundary.js"></script>
  <script src="js/a11y.js"></script>
  <script src="js/components/button.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/components/card.js"></script>
  <script src="js/components/input.js"></script>
  <script src="js/perf.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
