<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>Time Tracker</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  html, body { margin: 0; padding: 0; background: #0a0a0a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overscroll-behavior-y: none; }
  body.light { background: #f5f6f8; color: #0f172a; }

  body { --bg: #0a0a0a; --card: #13151a; --border: rgba(255,255,255,0.06); --text: #fff; --muted: #94a3b8; --dim: #64748b; --input-bg: #1a1d24; --input-border: rgba(255,255,255,0.06); --nav-bg: #0a0a0a; --cell-bg: rgba(255,255,255,0.02); --bar-bg: rgba(255,255,255,0.05); --ring: rgba(16,185,129,0.28); }
  body.light { --bg: #f5f6f8; --card: #ffffff; --border: #e2e8f0; --text: #0f172a; --muted: #64748b; --dim: #94a3b8; --input-bg: #f1f5f9; --input-border: #e2e8f0; --nav-bg: #ffffff; --cell-bg: #f8fafc; --bar-bg: #e2e8f0; --ring: rgba(5,150,105,0.22); }

  /* Category colors */
  body { --ot: #10b981; --vac: #38bdf8; --sick: #ef4444; --fsick: #ec4899; --pl: #14b8a6; --block: #f59e0b; --period: #a855f7; --fmla: #3b82f6; --warn: #f59e0b; --danger: #ef4444; }
  body.light { --ot: #059669; --vac: #0284c7; --sick: #dc2626; --fsick: #db2777; --pl: #0d9488; --block: #d97706; --period: #9333ea; --fmla: #2563eb; }

  .app { min-height: 100vh; background: var(--bg); color: var(--text); padding-bottom: calc(env(safe-area-inset-bottom) + 90px); transition: background 0.22s ease, color 0.22s ease; }
  button, input { transition: background 0.16s ease, border-color 0.16s ease, color 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease, transform 0.12s ease; }
  button:focus-visible, input:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--ring); border-color: var(--ot); }
  .container { max-width: 28rem; margin: 0 auto; padding: 16px; }
  @media (min-width: 768px) {
    .container { max-width: 56rem; padding: 24px; }
    h1 { font-size: 36px; }
    .greeting { font-size: 14px; }
    .header { margin-bottom: 24px; }
    .icon-btn { width: 46px; height: 46px; border-radius: 16px; }
  }
  @media (min-width: 1200px) {
    .container { max-width: 72rem; padding: 32px; }
    h1 { font-size: 42px; }
  }

  /* Two-column dashboard on tablet+ */
  .home-grid { display: block; }
  @media (min-width: 768px) {
    .home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
  }
  @media (min-width: 1200px) {
    .home-grid { grid-template-columns: 1fr 1.3fr; gap: 28px; }
  }

  h1 { font-size: 30px; font-weight: 700; margin: 4px 0 0 0; letter-spacing: -0.02em; }
  .greeting { font-size: 13px; color: var(--muted); }
  .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--dim); font-weight: 600; }
  .muted { color: var(--muted); }
  .num { font-variant-numeric: tabular-nums; }

  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; padding-top: 8px; }
  .header-buttons { display: flex; gap: 8px; }
  .icon-btn { width: 42px; height: 42px; border-radius: 14px; background: var(--card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text); cursor: pointer; padding: 0; }
  .icon-btn:hover, .small-btn:hover, .btn:hover, .time-picker-btn:hover, .backup-btn-big:hover { border-color: rgba(16,185,129,0.38); }
  .icon-btn:active { transform: scale(0.96); }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 14px; }
  .card, .period-card, .bank-card, .backup-section { box-shadow: 0 12px 32px rgba(0,0,0,0.10); transition: background 0.22s ease, border-color 0.18s ease, box-shadow 0.18s ease; }
  body.light .card, body.light .period-card, body.light .bank-card, body.light .backup-section { box-shadow: 0 10px 28px rgba(15,23,42,0.06); }
  .card-lg { border-radius: 22px; padding: 18px; }
  .card-mb { margin-bottom: 14px; }
  .card-mb-sm { margin-bottom: 10px; }

  /* Status alerts */
  .alert { border-radius: 14px; padding: 12px 14px; margin-bottom: 12px; display: flex; gap: 10px; align-items: flex-start; font-size: 13px; font-weight: 500; }
  .alert-warn { background: rgba(245, 158, 11, 0.12); border: 1px solid rgba(245, 158, 11, 0.3); color: var(--warn); }
  .alert-danger { background: rgba(239, 68, 68, 0.12); border: 1px solid rgba(239, 68, 68, 0.3); color: var(--danger); }
  .alert-info { background: rgba(168, 85, 247, 0.10); border: 1px solid rgba(168, 85, 247, 0.3); color: var(--period); }
  .alert-icon { flex-shrink: 0; margin-top: 1px; }
  .alert-body { flex: 1; }
  .alert-title { font-weight: 700; margin-bottom: 2px; }

  /* Period card */
  .period-card { background: var(--card); border: 1px solid var(--border); border-radius: 22px; padding: 18px; margin-bottom: 14px; }
  .period-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .period-range { font-size: 14px; font-weight: 500; color: var(--text); }
  .nav-row { display: flex; gap: 4px; }
  .big-num { font-size: 48px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; }
  .big-unit { font-size: 15px; color: var(--muted); }
  .progress-track { height: 6px; background: var(--bar-bg); border-radius: 3px; overflow: hidden; margin-top: 10px; }
  .progress-fill { height: 100%; background: linear-gradient(to right, var(--ot), #34d399); border-radius: 3px; transition: width 0.7s; }

  /* Banks grid */
  .banks-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  @media (min-width: 1200px) {
    .banks-grid { grid-template-columns: 1fr 1fr 1fr 1fr; }
  }
  .bank-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 12px; position: relative; }
  .bank-card.low { border-color: var(--warn); }
  .bank-card.empty { border-color: var(--danger); }
  .bank-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--dim); font-weight: 600; margin-bottom: 4px; }
  .bank-num { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1.1; }
  .bank-sub { font-size: 11px; color: var(--muted); margin-top: 2px; font-variant-numeric: tabular-nums; }
  .bank-vac .bank-num { color: var(--vac); }
  .bank-sick .bank-num { color: var(--sick); }
  .bank-fsick .bank-num { color: var(--fsick); }
  .bank-pl .bank-num { color: var(--pl); }
  .bank-fmla .bank-num { color: var(--fmla); }
  .bank-occ .bank-num { color: var(--period); }

  /* Quarter strip */
  .quarter-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 14px; }
  .q-pill { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 10px 4px; text-align: center; }
  .q-pill.active { border-color: var(--period); box-shadow: 0 0 0 1px var(--period); }
  .q-name { font-size: 9px; font-weight: 600; color: var(--muted); }
  .q-count { font-size: 18px; font-weight: 700; color: var(--text); margin-top: 2px; font-variant-numeric: tabular-nums; line-height: 1; }
  .q-pill.used .q-count { color: var(--sick); }
  .q-sub { font-size: 9px; color: var(--dim); margin-top: 2px; }

  /* Buttons */
  .btn { padding: 11px 14px; border-radius: 12px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text); font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--ot); color: white; border-color: var(--ot); padding: 14px; font-weight: 600; font-size: 15px; border-radius: 14px; width: 100%; }
  .btn-danger { background: var(--danger); color: white; border-color: var(--danger); }
  .btn-row { display: flex; gap: 8px; }
  .small-btn { width: 34px; height: 34px; border-radius: 10px; background: var(--input-bg); border: 1px solid var(--input-border); display: flex; align-items: center; justify-content: center; color: var(--text); cursor: pointer; padding: 0; }
  .small-btn:active { transform: scale(0.96); }

  /* Add Entry card */
  .toggle-row { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 12px; padding: 3px; margin-bottom: 10px; }
  .toggle-btn { padding: 9px; border-radius: 9px; border: none; background: transparent; color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .toggle-btn.active { background: var(--ot); color: white; }

  .date-input { width: 100%; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 10px; padding: 11px; color: var(--text); font-size: 16px; font-family: inherit; -webkit-appearance: none; appearance: none; }
  .date-input:focus { outline: none; border-color: var(--ot); }
  .date-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

  .type-chips { display: grid; grid-template-columns: repeat(6, 1fr); gap: 3px; margin: 10px 0; }
  .type-chip { padding: 8px 2px; border-radius: 9px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--muted); font-size: 10px; font-weight: 700; cursor: pointer; font-family: inherit; text-align: center; }
  .type-chip.active.ot { background: var(--ot); border-color: var(--ot); color: white; }
  .type-chip.active.vac { background: var(--vac); border-color: var(--vac); color: white; }
  .type-chip.active.sick { background: var(--sick); border-color: var(--sick); color: white; }
  .type-chip.active.fsick { background: var(--fsick); border-color: var(--fsick); color: white; }
  .type-chip.active.pl { background: var(--pl); border-color: var(--pl); color: white; }
  .type-chip.active.block { background: var(--block); border-color: var(--block); color: white; }
  .type-chip.active.fmla { background: var(--fmla); border-color: var(--fmla); color: white; }

  .hours-input { width: 100%; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 12px; padding: 12px; font-size: 22px; font-weight: 700; color: var(--text); text-align: center; font-variant-numeric: tabular-nums; outline: none; font-family: inherit; -webkit-appearance: none; -moz-appearance: textfield; }
  .hours-input::-webkit-outer-spin-button, .hours-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  /* Picker wheel */
  .picker-wrap { position: relative; height: 150px; margin: 8px 0 10px; border-radius: 14px; overflow: hidden; background: var(--input-bg); border: 1px solid var(--input-border); }
  .picker-scroll { height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; scrollbar-width: none; -ms-overflow-style: none; display: flex; flex-direction: column; }
  .picker-scroll::-webkit-scrollbar { display: none; }
  .picker-spacer { height: 50px; flex-shrink: 0; }
  .picker-item { height: 50px; scroll-snap-align: center; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: var(--dim); flex-shrink: 0; }
  .picker-overlay { position: absolute; inset: 0; pointer-events: none; box-shadow: inset 0 55px 28px var(--card), inset 0 -55px 28px var(--card); }
  .picker-sel-line { position: absolute; left: 14px; right: 14px; top: 50px; height: 50px; border-top: 2px solid var(--ot); border-bottom: 2px solid var(--ot); pointer-events: none; border-radius: 4px; }
  /* Time-picker popup */
  .time-picker-btn { width: 100%; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 12px; padding: 14px; font-size: 20px; font-weight: 700; color: var(--text); text-align: center; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 10px; margin: 8px 0 10px; }
  .time-picker-btn:not(:empty) { font-variant-numeric: tabular-nums; }
  .time-picker-btn:active { transform: scale(0.97); opacity: 0.85; }
  .tp-wheels { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 10px 0 6px; }
  .tp-wheel-col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .tp-wheel-wrap { position: relative; height: 150px; width: 96px; overflow: hidden; border-radius: 12px; background: var(--input-bg); border: 1px solid var(--input-border); }
  .tp-sep { font-size: 30px; font-weight: 700; color: var(--text); margin-bottom: 22px; }
  .tp-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--dim); font-weight: 600; }

  .quick-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; margin-top: 8px; margin-bottom: 10px; }
  .quick-row-2 { grid-template-columns: 1fr 1fr; }
  .quick-btn { padding: 9px 0; border-radius: 9px; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .quick-btn:active { transform: scale(0.96); }

  /* Projection (impact preview) */
  .projection { background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 10px; padding: 10px 12px; margin: 6px 0 10px; font-size: 12px; line-height: 1.5; }
  .projection.ok { color: var(--muted); }
  .projection.warn { background: rgba(245, 158, 11, 0.10); border-color: rgba(245, 158, 11, 0.3); color: var(--warn); }
  .projection.danger { background: rgba(239, 68, 68, 0.10); border-color: rgba(239, 68, 68, 0.3); color: var(--danger); }
  .projection-line { display: block; }
  .projection-line strong { font-weight: 700; }

  /* Month preview */
  .month-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .month-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .view-toggle { display: flex; gap: 3px; background: var(--input-bg); border-radius: 10px; padding: 3px; margin-bottom: 10px; border: 1px solid var(--input-border); }
  .view-toggle-btn { flex: 1; padding: 6px; border-radius: 8px; border: none; background: transparent; color: var(--muted); font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .view-toggle-btn.active { background: var(--card); color: var(--text); }
  .preview-item { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-top: 1px solid var(--border); cursor: pointer; }
  .preview-item:first-of-type { border-top: none; }
  .preview-item:active { opacity: 0.7; }
  .preview-tag { font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 6px; min-width: 34px; text-align: center; }
  .tag-ot { background: rgba(16, 185, 129, 0.15); color: var(--ot); }
  .tag-vac { background: rgba(56, 189, 248, 0.15); color: var(--vac); }
  .tag-sick { background: rgba(239, 68, 68, 0.15); color: var(--sick); }
  .tag-fsick { background: rgba(236, 72, 153, 0.15); color: var(--fsick); }
  .tag-pl { background: rgba(20, 184, 166, 0.15); color: var(--pl); }
  .tag-block { background: rgba(245, 158, 11, 0.15); color: var(--block); }
  .tag-fmla { background: rgba(59, 130, 246, 0.15); color: var(--fmla); }
  .preview-date { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; }
  .preview-hrs { font-size: 12px; font-weight: 600; color: var(--muted); font-variant-numeric: tabular-nums; }
  .preview-empty { padding: 16px 0; text-align: center; font-size: 12px; color: var(--muted); }

  /* Calendar */
  .cal-grid-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 6px; }
  .cal-day-name { text-align: center; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--dim); font-weight: 600; padding: 3px 0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .cal-cell { min-height: 46px; border-radius: 11px; border: 1px solid var(--border); background: var(--cell-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; padding: 3px 2px; color: var(--text); font-family: inherit; position: relative; overflow: hidden; }
  .cal-cell:active { transform: scale(0.94); }
  .cal-cell-num { font-size: 13px; font-weight: 500; }
  .cal-cell-sub { font-size: 7px; font-weight: 700; margin-top: 1px; line-height: 1.25; text-align: center; white-space: pre-line; }
  @media (min-width: 768px) {
    .cal-grid { gap: 8px; }
    .cal-cell-num { font-size: 16px; }
    .cal-cell-sub { font-size: 10px; margin-top: 3px; }
  }
  @media (min-width: 1200px) {
    .cal-cell-num { font-size: 18px; }
    .cal-cell-sub { font-size: 11px; }
  }
  .cal-cell.ot { background: rgba(16, 185, 129, 0.15); border-color: rgba(16, 185, 129, 0.35); }
  .cal-cell.ot .cal-cell-sub { color: var(--ot); }
  .cal-cell.vac { background: rgba(56, 189, 248, 0.15); border-color: rgba(56, 189, 248, 0.35); }
  .cal-cell.vac .cal-cell-sub { color: var(--vac); }
  .cal-cell.sick { background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.35); }
  .cal-cell.sick .cal-cell-sub { color: var(--sick); }
  .cal-cell.fsick { background: rgba(236, 72, 153, 0.15); border-color: rgba(236, 72, 153, 0.35); }
  .cal-cell.fsick .cal-cell-sub { color: var(--fsick); }
  .cal-cell.pl { background: rgba(20, 184, 166, 0.15); border-color: rgba(20, 184, 166, 0.35); }
  .cal-cell.pl .cal-cell-sub { color: var(--pl); }
  .cal-cell.block { background: rgba(245, 158, 11, 0.15); border-color: rgba(245, 158, 11, 0.35); }
  .cal-cell.block .cal-cell-num, .cal-cell.block .cal-cell-sub { color: var(--block); }
  .cal-cell.fmla { background: rgba(59, 130, 246, 0.15); border-color: rgba(59, 130, 246, 0.35); }
  .cal-cell.fmla .cal-cell-sub { color: var(--fmla); }
  .cal-cell.fmla-p2 { background: rgba(168,85,247,0.15); border-color: rgba(168,85,247,0.35); }
  .cal-cell.fmla-p2 .cal-cell-sub { color: #a855f7; }
  .cal-cell.fmla-p3 { background: rgba(245,158,11,0.15); border-color: rgba(245,158,11,0.35); }
  .cal-cell.fmla-p3 .cal-cell-sub { color: #f59e0b; }
  .cal-cell.fmla-p4 { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.35); }
  .cal-cell.fmla-p4 .cal-cell-sub { color: #ef4444; }
  .cal-cell.fmla-p5 { background: rgba(16,185,129,0.15); border-color: rgba(16,185,129,0.35); }
  .cal-cell.fmla-p5 .cal-cell-sub { color: #10b981; }
  .cal-cell.fmla-p6 { background: rgba(236,72,153,0.15); border-color: rgba(236,72,153,0.35); }
  .cal-cell.fmla-p6 .cal-cell-sub { color: #ec4899; }
  .cal-cell.ot-alt { background: rgba(34, 197, 94, 0.14); border-color: rgba(34, 197, 94, 0.35); }
  .cal-cell.ot-alt .cal-cell-sub { color: #22c55e; }
  .cal-cell.in-period { box-shadow: 0 0 0 1px var(--period), 0 0 8px rgba(168, 85, 247, 0.3); }
  .cal-cell.today { border: 2px solid var(--ot); box-shadow: none; }
  .cal-cell.in-period.today { box-shadow: 0 0 0 1px var(--period), 0 0 8px rgba(168, 85, 247, 0.3); }
  .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .cal-month { font-size: 16px; font-weight: 600; color: var(--text); }

  /* Bottom nav */
  .nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--nav-bg); border-top: 1px solid var(--border); z-index: 40; padding-bottom: env(safe-area-inset-bottom); }
  .nav-inner { max-width: 28rem; margin: 0 auto; display: flex; justify-content: space-around; align-items: center; padding: 6px; }
  @media (min-width: 768px) {
    .nav-inner { max-width: 56rem; padding: 10px; }
    .nav-icon-wrap { width: 44px; height: 44px; }
    .nav-label { font-size: 10px; }
  }
  @media (min-width: 1200px) {
    .nav-inner { max-width: 72rem; }
  }
  .nav-btn { flex: 1; background: none; border: none; padding: 6px 4px; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; color: var(--dim); font-family: inherit; }
  .nav-btn:active { transform: scale(0.96); }
  .nav-icon-wrap { width: 36px; height: 36px; border-radius: 11px; display: flex; align-items: center; justify-content: center; }
  .nav-btn.active { color: var(--ot); }
  .nav-btn.active .nav-icon-wrap { background: rgba(16, 185, 129, 0.1); }
  body.light .nav-btn.active .nav-icon-wrap { background: #ecfdf5; }
  .nav-label { font-size: 9px; font-weight: 700; letter-spacing: 0.06em; }

  /* Edit panel */
  .panel-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.68); backdrop-filter: blur(6px); z-index: 50; display: flex; align-items: flex-end; animation: fadeIn 0.2s ease; }
  .panel { position: relative; width: 100%; max-width: 28rem; margin: 0 auto; background: var(--card); border: 1px solid var(--border); border-top: 2px solid var(--ot); border-radius: 22px 22px 0 0; padding: 16px; padding-bottom: calc(env(safe-area-inset-bottom) + 20px); animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); max-height: 82vh; overflow-y: auto; }
  @media (min-width: 768px) {
    .panel-backdrop { align-items: center; padding: 20px; }
    .panel { max-width: 30rem; border-radius: 22px; padding-bottom: 24px; animation: scaleIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); }
  }
  .panel-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .panel-date { font-size: 16px; font-weight: 700; color: var(--text); margin-top: 2px; }
  .back-btn { display: inline-flex; align-items: center; gap: 4px; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text); padding: 8px 12px 8px 8px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; margin-bottom: 12px; }
  .back-btn:active { transform: scale(0.96); }

  /* Confirm modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); z-index: 60; display: flex; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.2s ease; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; max-width: 24rem; width: 100%; animation: scaleIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .modal-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .modal-body { font-size: 14px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
  .modal-actions { display: flex; gap: 8px; }

  /* Toast */
  .toast-wrap { position: fixed; top: 14px; left: 0; right: 0; display: flex; justify-content: center; padding: 0 14px; z-index: 100; pointer-events: none; }
  .toast { padding: 11px 18px; border-radius: 14px; font-size: 13px; font-weight: 500; box-shadow: 0 10px 25px rgba(0,0,0,0.3); animation: slideDown 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); max-width: 92%; text-align: center; }
  .toast-success { background: var(--ot); color: white; }
  .toast-error { background: var(--danger); color: white; }
  .toast-warn { background: var(--warn); color: white; }
  .toast-undo { background: rgba(255,255,255,0.22); border: none; color: white; padding: 4px 10px; border-radius: 8px; font-weight: 700; font-size: 12px; cursor: pointer; margin-left: 8px; font-family: inherit; vertical-align: middle; }
  .saved-signal { display: flex; align-items: center; gap: 5px; margin: -4px 0 12px; color: var(--muted); font-size: 11px; font-weight: 600; }
  .saved-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ot); box-shadow: 0 0 0 4px rgba(16,185,129,0.12); }

  /* Log */
  .filter-scroll { overflow-x: auto; -ms-overflow-style: none; scrollbar-width: none; margin-bottom: 10px; }
  .filter-scroll::-webkit-scrollbar { display: none; }
  .filter-row { display: flex; gap: 5px; padding-bottom: 3px; }
  .filter-chip { padding: 7px 12px; border-radius: 9px; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; flex-shrink: 0; }
  .filter-chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .log-list { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 14px; }
  .log-item { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; background: none; border: none; text-align: left; cursor: pointer; color: var(--text); font-family: inherit; gap: 10px; }
  .log-item + .log-item { border-top: 1px solid var(--border); }
  .log-date { font-size: 13px; font-weight: 500; color: var(--text); }
  .log-period { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .log-right { display: flex; align-items: center; gap: 8px; }
  .log-value { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }

  /* Settings */
  .setting-row { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .setting-row:last-child { border-bottom: none; }
  .setting-row .label { display: block; margin-bottom: 6px; }
  .setting-input { width: 100%; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 10px; padding: 9px 11px; color: var(--text); font-size: 16px; font-family: inherit; -webkit-appearance: none; }
  .setting-input:focus { outline: none; border-color: var(--ot); }
  .theme-row { display: flex; gap: 6px; }
  .theme-btn { flex: 1; padding: 9px; border-radius: 9px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .theme-btn.active { background: var(--ot); border-color: var(--ot); color: white; }

  .occ-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 6px; }
  .occ-box { background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 10px; padding: 8px; text-align: center; cursor: pointer; }
  .occ-box.set { background: var(--sick); border-color: var(--sick); color: white; }
  .occ-box-q { font-size: 9px; font-weight: 700; opacity: 0.8; }
  .occ-box-v { font-size: 18px; font-weight: 700; margin-top: 2px; }

  /* Backup section */
  .backup-section { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .backup-toggle { width: 100%; padding: 14px; background: none; border: none; display: flex; justify-content: space-between; align-items: center; cursor: pointer; color: var(--text); font-family: inherit; }
  .backup-toggle-left { display: flex; align-items: center; gap: 10px; }
  .backup-title { font-size: 14px; font-weight: 600; }
  .backup-status { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .backup-status.warn { color: var(--warn); }
  .backup-body { padding: 0 14px 14px; border-top: 1px solid var(--border); padding-top: 12px; }
  .backup-explain { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 10px; }
  .backup-btn-big { width: 100%; padding: 12px; border-radius: 11px; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 10px; font-family: inherit; text-align: left; margin-bottom: 6px; }
  .backup-btn-big:active { transform: scale(0.98); }
  .backup-btn-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--ot); color: white; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .backup-btn-icon.imp { background: var(--vac); }
  .backup-btn-main { flex: 1; }
  .backup-btn-sub { font-size: 11px; color: var(--muted); margin-top: 2px; font-weight: 500; }

  /* Animations */
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes slideDown { from { transform: translateY(-40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes softShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
  .tp-invalid { animation: softShake 0.18s ease; color: var(--danger) !important; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; scroll-behavior: auto !important; }
  }

  .hidden { display: none !important; }
  .mb-1 { margin-bottom: 4px; }
  .mb-2 { margin-bottom: 8px; }
  .mb-3 { margin-bottom: 12px; }
  .mt-1 { margin-top: 4px; }
  .mt-2 { margin-top: 8px; }
  .mt-3 { margin-top: 12px; }
  .text-sm { font-size: 13px; }
  .text-xs { font-size: 11px; }
  .text-center { text-align: center; }
  .flex-between { display: flex; justify-content: space-between; align-items: center; }

<body>
<div class="app">
  <div class="container">
    <div class="header">
      <div>
        <div class="greeting" id="greeting">Good evening, David</div>
        <h1>Time Tracker</h1>
      </div>
      <div class="header-buttons">
        <button class="icon-btn" id="themeBtn" aria-label="Theme"></button>
        <button class="icon-btn" id="settingsBtn" aria-label="Settings"></button>
      </div>
    </div>
    <div id="content"></div>
  </div>
  <div class="nav"><div class="nav-inner" id="nav"></div></div>
  <div id="panel"></div>
  <div id="modal"></div>
  <div id="toast"></div>
  <input type="file" id="fileInput" accept=".json" style="display:none">
</div>

<script>
(function() {
  'use strict';

  var STORAGE_KEY = 'tracker-v3-data';
  var THEME_KEY = 'tracker-v3-theme';
  var SETTINGS_KEY = 'tracker-v3-settings';
  var META_KEY = 'tracker-v3-meta';
  var START_DATE = new Date(2026, 4, 15);
  var MS_PER_DAY = 86400000;
  var WORK_YEAR_START_MONTH = 8; // September
  var FAMILY_SICK_CAP_DAYS = 10;
  var PL_CAP_DAYS = 3;
  var MAX_CONSEC_WORKDAYS = 5;

  var state = {
    theme: 'dark',
    data: {},
    settings: {
      vacationRemaining: 0,
      sickRemaining: 0,
      familySickUsedDays: 0,
      plUsedDays: 0,
      manualOccasions: [0, 0, 0, 0],
      manualOccasionNotes: ['', '', '', ''],
      workdayHours: 7.5,
      snapshotDate: '',
      fmlaEnabled: false,
      fmlaStartDate: '',
      fmlaSnapshotHours: 0,
      fmlaPeriods: []
    },
    meta: { lastBackup: '', lastSaved: '', backupRevision: 0 },
    tab: 'home',
    calMonth: new Date(),
    activePeriod: 0,
    selectedDate: null,
    editType: 'ot',
    editHours: '0',
    addMode: 'single',
    addDateStart: '',
    addDateEnd: '',
    addType: 'ot',
    addHours: '0',
    previewMode: 'month',
    previewMonth: new Date(),
    previewPeriod: 0,
    logFilter: 'all',
    backupOpen: false,
    snapshotUnit: 'days',
    confirmCb: null,
    undoAction: null
  };

  try { state.theme = localStorage.getItem(THEME_KEY) || 'dark'; } catch (e) {}
  try {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved) { var p = JSON.parse(saved); if (p && p.data) state.data = p.data; }
  } catch (e) {}
  try {
    var ss = localStorage.getItem(SETTINGS_KEY);
    if (ss) {
      var sp = JSON.parse(ss);
      for (var k in sp) if (sp[k] !== undefined) state.settings[k] = sp[k];
      if (!Array.isArray(state.settings.manualOccasions) || state.settings.manualOccasions.length !== 4) state.settings.manualOccasions = [0,0,0,0];
      if (!Array.isArray(state.settings.manualOccasionNotes) || state.settings.manualOccasionNotes.length !== 4) state.settings.manualOccasionNotes = ['','','',''];
      if (!Array.isArray(state.settings.fmlaPeriods)) state.settings.fmlaPeriods = [];
      if (state.settings.fmlaStartDate && state.settings.fmlaPeriods.length === 0) {
        state.settings.fmlaPeriods = [{ id: 'fp1', label: 'Period 1', startDate: state.settings.fmlaStartDate, snapshotHours: state.settings.fmlaSnapshotHours || 0 }];
      }
    }
  } catch (e) {}
  try {
    var mm = localStorage.getItem(META_KEY);
    if (mm) state.meta = JSON.parse(mm);
  } catch (e) {}
  state.activePeriod = getPayPeriod(new Date());
  state.previewPeriod = state.activePeriod;
  state.addDateStart = formatDateKey(new Date());
  state.addDateEnd = formatDateKey(new Date());

  // === Date helpers ===
  function formatDateKey(d) {
    var y = d.getFullYear();
    var m = String(d.getMonth() + 1); if (m.length < 2) m = '0' + m;
    var day = String(d.getDate()); if (day.length < 2) day = '0' + day;
    return y + '-' + m + '-' + day;
  }
  function parseDateKey(k) {
    if (!k || typeof k !== 'string') return new Date();
    var p = k.split('-');
    if (p.length !== 3) return new Date();
    var y = parseInt(p[0]), m = parseInt(p[1]), d = parseInt(p[2]);
    if (isNaN(y) || isNaN(m) || isNaN(d)) return new Date();
    return new Date(y, m - 1, d);
  }
  function getPayPeriod(d) { return Math.floor(Math.floor((d - START_DATE) / MS_PER_DAY) / 14); }
  function getPeriodStart(i) { return new Date(START_DATE.getTime() + i * 14 * MS_PER_DAY); }
  function getPeriodEnd(i) { return new Date(START_DATE.getTime() + (i * 14 + 13) * MS_PER_DAY); }
  function formatPeriodRange(i) {
    var s = getPeriodStart(i), e = getPeriodEnd(i);
    var opts = { month: 'short', day: 'numeric' };
    return s.toLocaleDateString('en-US', opts) + ' - ' + e.toLocaleDateString('en-US', opts);
  }
  function isWorkday(d) { return d.getDay() !== 0 && d.getDay() !== 6; }
  function nextWorkday(d) {
    var nd = new Date(d.getTime() + MS_PER_DAY);
    while (!isWorkday(nd)) nd = new Date(nd.getTime() + MS_PER_DAY);
    return nd;
  }
  function daysBetween(a, b) { return Math.round((b - a) / MS_PER_DAY); }

  function haptic(style) {
    try {
      if (navigator.vibrate) {
        var p = { light: 10, medium: 20, heavy: 30, success: [10, 30, 10] };
        navigator.vibrate(p[style || 'light'] || 10);
      }
    } catch (e) {}
  }
  function markSaved() { state.meta.lastSaved = new Date().toISOString(); saveMeta(); }
  function saveData() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ version: 3, data: state.data })); markSaved(); } catch (e) {} }
  function saveSettings() { try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.settings)); markSaved(); } catch (e) {} }
  function saveMeta() { try { localStorage.setItem(META_KEY, JSON.stringify(state.meta)); } catch (e) {} }
  function escapeHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

  // === Multi-entry data helpers ===
  // Each date can have multiple entries: [{type,hours}, ...] or single {type,hours} (backward compat)
  function getDateEntries(key) {
    var e = state.data[key];
    if (!e) return [];
    if (Array.isArray(e)) return e;
    return [e]; // backward compat: single entry object
  }
  function setDateEntries(key, arr) {
    if (!arr || arr.length === 0) { delete state.data[key]; }
    else if (arr.length === 1) { state.data[key] = arr[0]; } // single: keep as plain object
    else { state.data[key] = arr; }
  }
  function fmtCompact(h) {
    if (typeof h !== 'number') return '?';
    var r = Math.round(h * 100) / 100;
    if (r === Math.floor(r)) return String(Math.floor(r));
    return (r % 0.5 === 0) ? r.toFixed(1) : r.toFixed(2);
  }

  // === Year helpers ===
  function getWorkYearStart(d) {
    var y = d.getFullYear();
    var startYear = d.getMonth() >= WORK_YEAR_START_MONTH ? y : y - 1;
    return new Date(startYear, WORK_YEAR_START_MONTH, 1);
  }
  function getWorkYearEnd(d) {
    var s = getWorkYearStart(d);
    return new Date(s.getFullYear() + 1, WORK_YEAR_START_MONTH, 0);
  }
  function getCalYearStart(d) { return new Date(d.getFullYear(), 0, 1); }
  function getCalYearEnd(d) { return new Date(d.getFullYear(), 11, 31); }
  // === FMLA helpers (multi-period) ===
  var FMLA_PERIOD_COLORS = ['#3b82f6','#a855f7','#f59e0b','#ef4444','#10b981','#ec4899'];
  var FMLA_PERIOD_CSS    = ['fmla','fmla-p2','fmla-p3','fmla-p4','fmla-p5','fmla-p6'];
  var FMLA_PERIOD_NAMES  = ['Blue','Purple','Amber','Red','Green','Pink'];

  function getFmlaPeriods() {
    var periods = state.settings.fmlaPeriods || [];
    return periods.slice().sort(function(a,b){ return a.startDate < b.startDate ? -1 : 1; });
  }
  function getFmlaPeriodIndex(period) {
    var periods = getFmlaPeriods();
    for (var i = 0; i < periods.length; i++) if (periods[i].id === period.id) return i;
    return 0;
  }
  function getFmlaPeriodColor(period) {
    return FMLA_PERIOD_COLORS[getFmlaPeriodIndex(period) % FMLA_PERIOD_COLORS.length];
  }
  function getFmlaPeriodCssClass(period) {
    return FMLA_PERIOD_CSS[getFmlaPeriodIndex(period) % FMLA_PERIOD_CSS.length];
  }
  function getFmlaPeriodForDateStr(dateKey) {
    var periods = getFmlaPeriods();
    var result = null;
    for (var i = 0; i < periods.length; i++) {
      if (periods[i].startDate && periods[i].startDate <= dateKey) result = periods[i];
      else break;
    }
    return result;
  }
  function getFmlaPeriodHoursUsed(period) {
    if (!period || !period.startDate) return 0;
    var periods = getFmlaPeriods();
    var idx = getFmlaPeriodIndex(period);
    var nextStart = (idx + 1 < periods.length) ? periods[idx + 1].startDate : null;
    var total = parseFloat(period.snapshotHours) || 0;
    for (var k in state.data) {
      if (k < period.startDate) continue;
      if (nextStart && k >= nextStart) continue;
      var dayEntries = getDateEntries(k);
      for (var di = 0; di < dayEntries.length; di++) {
        var e = dayEntries[di];
        if (!e || e.type !== 'fmla') continue;
        total += e.hours || 0;
      }
    }
    return total;
  }
  function getFmlaTotalHours() { return 12 * 5 * WD(); }
  function getFmlaPeriodHoursLeft(period) { return getFmlaTotalHours() - getFmlaPeriodHoursUsed(period); }
  function getCurrentFmlaPeriod() {
    if (!state.settings.fmlaEnabled) return null;
    return getFmlaPeriodForDateStr(formatDateKey(new Date()));
  }
  function getFmlaWindowStart() {
    var p = getCurrentFmlaPeriod();
    return p ? parseDateKey(p.startDate) : null;
  }
  function getFmlaWindowEnd() {
    var s = getFmlaWindowStart();
    if (!s) return null;
    return new Date(s.getFullYear() + 1, s.getMonth(), s.getDate() - 1);
  }
  function inFmlaWindow(d) {
    var s = getFmlaWindowStart(), e = getFmlaWindowEnd();
    if (!s || !e) return false;
    return d >= s && d <= e;
  }
  function calcFmlaHoursUsed() {
    var p = getCurrentFmlaPeriod();
    return p ? getFmlaPeriodHoursUsed(p) : 0;
  }
  function calcFmlaHoursLeft() {
    var p = getCurrentFmlaPeriod();
    return p ? getFmlaPeriodHoursLeft(p) : 0;
  }
  function calcSickChargeFromFmla() {
    var today = new Date(), total = 0;
    for (var k in state.data) {
      var d = parseDateKey(k);
      if (!inWorkYear(d, today)) continue;
      var dayEntries = getDateEntries(k);
      for (var di = 0; di < dayEntries.length; di++) {
        var e = dayEntries[di];
        if (!e || e.type !== 'fmla') continue;
        if (typeof e.sickCharge === 'number') total += e.sickCharge;
      }
    }
    return total;
  }
  function calcVacChargeFromFmla() {
    var today = new Date(), total = 0;
    for (var k in state.data) {
      var d = parseDateKey(k);
      if (!inWorkYear(d, today)) continue;
      var dayEntries = getDateEntries(k);
      for (var di = 0; di < dayEntries.length; di++) {
        var e = dayEntries[di];
        if (!e || e.type !== 'fmla') continue;
        if (typeof e.vacCharge === 'number') total += e.vacCharge;
      }
    }
    return total;
  }


  function getQuarterIndex(d) {
    var monthsFromStart = (d.getFullYear() - getWorkYearStart(d).getFullYear()) * 12 + (d.getMonth() - WORK_YEAR_START_MONTH);
    return Math.floor(monthsFromStart / 3);
  }
  function getQuarterMonths(qIdx) {
    var months = [];
    for (var i = 0; i < 3; i++) months.push((WORK_YEAR_START_MONTH + qIdx * 3 + i) % 12);
    return months;
  }
  function getQuarterName(qIdx) {
    var m = getQuarterMonths(qIdx);
    var names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return names[m[0]] + '-' + names[m[2]];
  }
  function daysUntilSep1() {
    var today = new Date();
    var nextSep = new Date(today.getFullYear(), 8, 1);
    if (today >= nextSep) nextSep = new Date(today.getFullYear() + 1, 8, 1);
    return Math.ceil((nextSep - today) / MS_PER_DAY);
  }
  function daysUntilJan1() {
    var today = new Date();
    var nextJan = new Date(today.getFullYear() + 1, 0, 1);
    return Math.ceil((nextJan - today) / MS_PER_DAY);
  }

  // === Type info ===
  var TYPES = {
    ot:    { label: 'OT', name: 'Overtime', color: 'ot', tag: 'OT' },
    vac:   { label: 'VAC', name: 'Vacation', color: 'vac', tag: 'V' },
    sick:  { label: 'SICK', name: 'Sick', color: 'sick', tag: 'S' },
    fsick: { label: 'FS', name: 'Family Sick', color: 'fsick', tag: 'FS' },
    pl:    { label: 'PL', name: 'Personal Leave', color: 'pl', tag: 'PL' },
    block: { label: 'OFF', name: 'Blocked', color: 'block', tag: 'OFF' },
    fmla:  { label: 'FMLA', name: 'FMLA Leave', color: 'fmla', tag: 'FMLA' }
  };
  var WD = function() { return state.settings.workdayHours || 7.5; };

  // === Date filter helpers ===
  function inWorkYear(d, ref) { return d >= getWorkYearStart(ref) && d <= getWorkYearEnd(ref); }
  function inCalYear(d, ref) { return d >= getCalYearStart(ref) && d <= getCalYearEnd(ref); }
  function getEntriesIn(type, filterFn) {
    var arr = [];
    for (var k in state.data) {
      var d = parseDateKey(k);
      if (!filterFn(d)) continue;
      var dayEntries = getDateEntries(k);
      for (var di = 0; di < dayEntries.length; di++) {
        var e = dayEntries[di];
        if (!e || e.type !== type) continue;
        arr.push({ key: k, date: d, entry: e });
      }
    }
    return arr;
  }
  function sumHours(arr) {
    var s = 0;
    for (var i = 0; i < arr.length; i++) { var h = arr[i].entry.hours; if (typeof h === 'number') s += h; }
    return s;
  }

  // === Bank calculations ===
  function calcVacationLeft(extraSubtract) {
    var today = new Date();
    var used = sumHours(getEntriesIn('vac', function(d) { return d <= getWorkYearEnd(today) && d >= getWorkYearStart(today); }));
    var fmlaVac = calcVacChargeFromFmla();
    var left = state.settings.vacationRemaining - used - fmlaVac - (extraSubtract || 0);
    return left;
  }
  function calcSickLeft(extraSubtract) {
    var today = new Date();
    var sickUsed = sumHours(getEntriesIn('sick', function(d) { return d <= getWorkYearEnd(today) && d >= getWorkYearStart(today); }));
    var fsickUsed = sumHours(getEntriesIn('fsick', function(d) { return d <= getCalYearEnd(today) && d >= getCalYearStart(today); }));
    var fmlaSick = calcSickChargeFromFmla();
    return state.settings.sickRemaining - sickUsed - fsickUsed - fmlaSick - (extraSubtract || 0);
  }
  function calcFamilySickDaysUsed(extraAdd) {
    var today = new Date();
    var entries = getEntriesIn('fsick', function(d) { return inCalYear(d, today); });
    var hours = sumHours(entries);
    var days = hours / WD();
    return state.settings.familySickUsedDays + days + (extraAdd || 0);
  }
  function calcPLDaysUsed(extraAdd) {
    var today = new Date();
    var entries = getEntriesIn('pl', function(d) { return inCalYear(d, today); });
    var hours = sumHours(entries);
    var days = hours / WD();
    return state.settings.plUsedDays + days + (extraAdd || 0);
  }

  // === Stretches (consecutive workdays of sick/fsick ONLY, no breaks) ===
  function getStretches(filterFn) {
    // Build a map of dates that have any sick or fsick entry
    var dateMap = {};
    for (var k in state.data) {
      var dayEntries = getDateEntries(k);
      var hasSick = false, hasAny = false;
      for (var ei = 0; ei < dayEntries.length; ei++) {
        if (dayEntries[ei].type === 'sick') { hasSick = true; hasAny = true; }
        else if (dayEntries[ei].type === 'fsick') { hasAny = true; }
      }
      if (hasAny) {
        var d = parseDateKey(k);
        if (!filterFn || filterFn(d)) dateMap[k] = { key: k, date: d, hasSick: hasSick };
      }
    }
    var keys = Object.keys(dateMap).sort();
    var stretches = [], current = null;
    for (var i = 0; i < keys.length; i++) {
      var info = dateMap[keys[i]];
      if (!current) {
        current = { start: info.date, end: info.date, days: 1, hasSick: info.hasSick };
      } else {
        var next = nextWorkday(current.end);
        if (formatDateKey(next) === info.key) {
          current.end = info.date; current.days++;
          if (info.hasSick) current.hasSick = true;
        } else {
          stretches.push(current);
          current = { start: info.date, end: info.date, days: 1, hasSick: info.hasSick };
        }
      }
    }
    if (current) stretches.push(current);
    return stretches;
  }

  function getOccasionsByQuarter() {
    var today = new Date();
    var counts = [0, 0, 0, 0];
    var stretches = getStretches(function(d) { return inWorkYear(d, today); });
    for (var i = 0; i < stretches.length; i++) {
      var s = stretches[i];
      if (!s.hasSick) continue;
      var q = getQuarterIndex(s.start);
      if (q >= 0 && q < 4) counts[q]++;
    }
    // Add manual offsets
    for (var j = 0; j < 4; j++) counts[j] += state.settings.manualOccasions[j] || 0;
    return counts;
  }

  // === Conflict / projection checks ===
  // Returns { ok, blocks, warns, info } where blocks/warns/info are arrays of messages
  function checkEntry(type, hours, dateStr) {
    var blocks = [], warns = [], info = [];
    try {

    if (type === 'vac') {
      var newLeft = calcVacationLeft(hours);
      if (newLeft < 0) blocks.push('Not enough vacation. Have ' + calcVacationLeft(0).toFixed(2) + ' hrs, need ' + hours + '.');
      else if (newLeft < WD() * 3) warns.push('Vacation low after this: ' + newLeft.toFixed(2) + ' hrs left (' + (newLeft / WD()).toFixed(1) + ' days).');
      else info.push('After save: ' + newLeft.toFixed(2) + ' vacation hrs left (' + (newLeft / WD()).toFixed(1) + ' days).');
    }

    if (type === 'sick') {
      var newSickLeft = calcSickLeft(hours);
      if (newSickLeft < 0) blocks.push('Not enough sick hours. Have ' + calcSickLeft(0).toFixed(2) + ', need ' + hours + '.');
      else if (newSickLeft < WD() * 3) warns.push('Sick low after this: ' + newSickLeft.toFixed(2) + ' hrs left.');
      else info.push('After save: ' + newSickLeft.toFixed(2) + ' sick hrs left.');

      // Occasion check
      if (dateStr) {
        var d = parseDateKey(dateStr);
        var q = getQuarterIndex(d);
        var counts = getOccasionsByQuarter();
        // Conservatively assume this will be a new occasion if no adjacent sick/fsick exists
        var couldAdd = checkWouldAddOccasion(dateStr, type);
        if (couldAdd && q >= 0 && q < 4 && counts[q] >= 1) {
          var occNum = counts[q] + 1; var occSuffix = occNum === 1 ? 'st' : occNum === 2 ? 'nd' : occNum === 3 ? 'rd' : 'th'; warns.push('This would be your ' + occNum + occSuffix + ' occasion in ' + getQuarterName(q) + '. Limit is 1 per quarter.');
        }
      }
    }

    if (type === 'fsick') {
      var newSickLeft2 = calcSickLeft(hours);
      if (newSickLeft2 < 0) blocks.push('Family sick draws from sick bank. Have ' + calcSickLeft(0).toFixed(2) + ' sick hrs, need ' + hours + '.');
      var newFsickDays = calcFamilySickDaysUsed(hours / WD());
      if (newFsickDays > FAMILY_SICK_CAP_DAYS) blocks.push('Exceeds 10-day family sick cap. Have ' + (FAMILY_SICK_CAP_DAYS - calcFamilySickDaysUsed(0)).toFixed(2) + ' days left.');
      else if (newFsickDays > FAMILY_SICK_CAP_DAYS - 2) warns.push('Family sick low: ' + (FAMILY_SICK_CAP_DAYS - newFsickDays).toFixed(2) + ' days left after this.');
      else info.push('After save: ' + (FAMILY_SICK_CAP_DAYS - newFsickDays).toFixed(2) + ' family sick days left.');
    }

    if (type === 'pl') {
      var newPlDays = calcPLDaysUsed(hours / WD());
      if (newPlDays > PL_CAP_DAYS) blocks.push('Exceeds 3-day PL cap. Have ' + (PL_CAP_DAYS - calcPLDaysUsed(0)).toFixed(2) + ' days left.');
      else info.push('After save: ' + (PL_CAP_DAYS - newPlDays).toFixed(2) + ' PL days left.');
    }

    if (type === 'fmla') {
      if (!getCurrentFmlaPeriod()) {
        blocks.push('Add an FMLA period in Settings (FMLA Tracking section) before logging FMLA leave.');
      } else {
        var fmlaLeft = calcFmlaHoursLeft();
        if (fmlaLeft < hours) {
          blocks.push('Only ' + fmlaLeft.toFixed(2) + ' FMLA hrs left of your 12-week entitlement (' + (fmlaLeft/WD()/5).toFixed(1) + ' weeks).');
        } else {
          var sickNow = Math.max(0, calcSickLeft(0));
          var vacNow = Math.max(0, calcVacationLeft(0));
          var sc = Math.min(hours, sickNow);
          var vacNeeded = hours - sc;
          var unpaid = Math.max(0, vacNeeded - vacNow);
          if (unpaid > 0) {
            warns.push(unpaid.toFixed(2) + ' hrs will be UNPAID FMLA (sick + vacation banks insufficient). Confirm with HR.');
          } else if (vacNeeded > 0) {
            info.push('Sick covers ' + sc.toFixed(2) + ' hrs, vacation covers ' + vacNeeded.toFixed(2) + ' hrs. After: ' + (fmlaLeft - hours).toFixed(2) + ' FMLA hrs left.');
          } else {
            info.push('Sick bank covers all ' + hours + ' hrs. After: ' + (fmlaLeft - hours).toFixed(2) + ' FMLA hrs (' + ((fmlaLeft - hours)/WD()/5).toFixed(1) + ' weeks) left.');
          }
          if (fmlaLeft - hours < WD() * 5 * 2 && fmlaLeft - hours >= 0) {
            warns.push('Low FMLA: only ' + (fmlaLeft - hours).toFixed(2) + ' hrs (' + ((fmlaLeft - hours)/WD()/5).toFixed(1) + ' weeks) remaining after this entry.');
          }
        }
      }
    }

    // Consecutive workdays check (sick/fsick chains)
    if (dateStr && (type === 'sick' || type === 'fsick')) {
      var consecLen = projectConsecutiveLength(dateStr, type);
      if (consecLen > MAX_CONSEC_WORKDAYS) warns.push('This makes ' + consecLen + ' consecutive workdays of sick/family sick. Limit before doctor note: ' + MAX_CONSEC_WORKDAYS + '.');
    }

    } catch (err) {
      console.error('checkEntry error:', err);
    }
    return { ok: blocks.length === 0, blocks: blocks, warns: warns, info: info };
  }

  function checkWouldAddOccasion(dateStr, type) {
    var d = parseDateKey(dateStr);
    var origData = state.data[dateStr];
    var result = false;
    try {
      var tempEntries = getDateEntries(dateStr).slice();
      var found = false;
      for (var ti = 0; ti < tempEntries.length; ti++) { if (tempEntries[ti].type === type) { found = true; break; } }
      if (!found) tempEntries.push({ type: type, hours: 1 });
      state.data[dateStr] = tempEntries;
      var stretches = getStretches(function(dd) { return inWorkYear(dd, d); });
      for (var i = 0; i < stretches.length; i++) {
        var s = stretches[i];
        if (d >= s.start && d <= s.end) { result = s.hasSick; break; }
      }
    } catch (err) { result = false; }
    finally {
      if (origData === undefined) delete state.data[dateStr];
      else state.data[dateStr] = origData;
    }
    return result;
  }

  function projectConsecutiveLength(dateStr, type) {
    var d = parseDateKey(dateStr);
    var origData = state.data[dateStr];
    var len = 1;
    try {
      var tempEntries = getDateEntries(dateStr).slice();
      var found = false;
      for (var ti = 0; ti < tempEntries.length; ti++) { if (tempEntries[ti].type === type) { found = true; break; } }
      if (!found) tempEntries.push({ type: type, hours: 1 });
      state.data[dateStr] = tempEntries;
      var stretches = getStretches(function(dd) { return inWorkYear(dd, d); });
      for (var i = 0; i < stretches.length; i++) {
        var s = stretches[i];
        if (d >= s.start && d <= s.end) { len = s.days; break; }
      }
    } catch (err) { len = 1; }
    finally {
      if (origData === undefined) delete state.data[dateStr];
      else state.data[dateStr] = origData;
    }
    return len;
  }

  // === Toast ===
  var toastTimer = null;
  function showToast(msg, type, undoFn) {
    var el = document.getElementById('toast');
    var cls = type === 'error' ? 'toast-error' : type === 'warn' ? 'toast-warn' : 'toast-success';
    state.undoAction = undoFn || null;
    var undoBtn = undoFn ? '<button class="toast-undo" data-action="undo-action">Undo</button>' : '';
    el.innerHTML = '<div class="toast-wrap"><div class="toast ' + cls + '" style="display:flex;align-items:center">' + escapeHtml(msg) + undoBtn + '</div></div>';
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { el.innerHTML = ''; state.undoAction = null; }, 4000);
  }

  // === Confirm modal ===
  function showConfirm(title, body, onConfirm, confirmLabel) {
    state.confirmCb = onConfirm;
    var el = document.getElementById('modal');
    el.innerHTML = ''
      + '<div class="modal-backdrop" data-action="modal-cancel">'
        + '<div class="modal" data-stop="1">'
          + '<div class="modal-title">' + escapeHtml(title) + '</div>'
          + '<div class="modal-body">' + body + '</div>'
          + '<div class="modal-actions">'
            + '<button class="btn" style="flex:1" data-action="modal-cancel">Cancel</button>'
            + '<button class="btn-primary" style="flex:1;padding:11px;width:auto" data-action="modal-ok">' + escapeHtml(confirmLabel || 'Continue') + '</button>'
          + '</div>'
        + '</div>'
      + '</div>';
  }
  function closeConfirm() {
    state.confirmCb = null;
    document.getElementById('modal').innerHTML = '';
  }

  // === Theme ===
  function applyTheme() {
    document.body.classList.toggle('light', state.theme === 'light');
    var meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute('content', state.theme === 'dark' ? '#0a0a0a' : '#f5f6f8');
    try { localStorage.setItem(THEME_KEY, state.theme); } catch (e) {}
    document.getElementById('themeBtn').innerHTML = state.theme === 'dark' ? icons.moon : icons.sun;
  }
  function setGreeting() {
    var h = new Date().getHours();
    var g = h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
    document.getElementById('greeting').textContent = g + ', David';
  }

  // === Type chips ===
  function renderTypeChips(active, includeBlock, dataAction, includeFmla) {
    var types = ['ot', 'vac', 'sick', 'fsick', 'pl'];
    if (includeFmla && state.settings.fmlaEnabled) types.push('fmla');
    if (includeBlock) types.push('block');
    var html = '<div class="type-chips" style="grid-template-columns:repeat(' + types.length + ',1fr)">';
    for (var i = 0; i < types.length; i++) {
      var t = types[i];
      var cls = 'type-chip ' + TYPES[t].color + (active === t ? ' active' : '');
      html += '<button class="' + cls + '" data-action="' + dataAction + '" data-type="' + t + '">' + TYPES[t].label + '</button>';
    }
    html += '</div>';
    return html;
  }

  // === Status alerts (Home top) ===
  function renderStatusAlerts() {
    var html = '';
    var needsSnapshot = state.settings.vacationRemaining === 0 && state.settings.sickRemaining === 0;
    if (needsSnapshot) {
      html += '<div class="alert alert-info" data-action="goto-settings"><span class="alert-icon">' + icons.info + '</span><div class="alert-body"><div class="alert-title">Set your starting balances</div>Tap to open Settings and enter your current vacation hours, sick hours, occasions used, and PL/family sick days used.</div></div>';
    }

    var vacLeft = calcVacationLeft(0);
    var sickLeft = calcSickLeft(0);
    var fsickLeft = FAMILY_SICK_CAP_DAYS - calcFamilySickDaysUsed(0);
    var plLeft = PL_CAP_DAYS - calcPLDaysUsed(0);
    var qCounts = getOccasionsByQuarter();
    var currQ = getQuarterIndex(new Date());

    var alerts = [];
    if (vacLeft > 0 && vacLeft < WD() * 2) alerts.push({ type: 'warn', title: 'Vacation low', body: vacLeft.toFixed(2) + ' hrs (' + (vacLeft / WD()).toFixed(1) + ' days) remaining.' });
    if (vacLeft <= 0 && state.settings.vacationRemaining > 0) alerts.push({ type: 'danger', title: 'Vacation depleted', body: 'You have 0 vacation hours available.' });
    if (sickLeft > 0 && sickLeft < WD() * 2) alerts.push({ type: 'warn', title: 'Sick bank low', body: sickLeft.toFixed(2) + ' hrs left. Family sick also draws from this.' });
    if (sickLeft <= 0 && state.settings.sickRemaining > 0) alerts.push({ type: 'danger', title: 'Sick bank depleted', body: 'No sick hours available. Family sick is also unavailable until this refills.' });
    if (fsickLeft <= 2 && fsickLeft > 0) alerts.push({ type: 'warn', title: 'Family sick low', body: fsickLeft.toFixed(1) + ' of 10 days remaining this calendar year.' });
    if (fsickLeft <= 0 && state.settings.sickRemaining > 0) alerts.push({ type: 'danger', title: 'Family sick exhausted', body: '10-day cap reached. Resets January 1.' });
    if (plLeft <= 1 && plLeft > 0) alerts.push({ type: 'warn', title: 'PL low', body: plLeft.toFixed(1) + ' of 3 days remaining this calendar year.' });
    if (plLeft <= 0) alerts.push({ type: 'warn', title: 'PL exhausted', body: '3-day cap reached. Resets January 1.' });

    if (currQ >= 0 && currQ < 4 && qCounts[currQ] >= 1) {
      alerts.push({ type: 'warn', title: 'Q' + (currQ + 1) + ' occasion used', body: 'You used your sick occasion for ' + getQuarterName(currQ) + '. Next available ' + getQuarterName((currQ + 1) % 4) + '.' });
    }

    if (state.settings.fmlaEnabled && state.settings.fmlaPeriods && state.settings.fmlaPeriods.length > 0) {
      var fmlaLeftAl = calcFmlaHoursLeft();
      var fmlaRenewDate = getFmlaWindowEnd();
      var daysToRenew = fmlaRenewDate ? Math.ceil((fmlaRenewDate - new Date()) / MS_PER_DAY) : null;
      if (fmlaLeftAl <= 0) {
        alerts.push({ type: 'danger', title: 'FMLA exhausted', body: '12-week entitlement used. Leave is unpaid until renewal ' + (fmlaRenewDate ? fmlaRenewDate.toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}) : '') + '.' });
      } else if (fmlaLeftAl < WD() * 5 * 2) {
        alerts.push({ type: 'warn', title: 'FMLA running low', body: fmlaLeftAl.toFixed(1) + ' hrs (' + (fmlaLeftAl/WD()/5).toFixed(1) + ' weeks) remaining of 12-week entitlement.' });
      }
      if (daysToRenew !== null && daysToRenew <= 30 && daysToRenew > 0 && fmlaLeftAl > 0) {
        alerts.push({ type: 'info', title: 'FMLA year renews soon', body: 'Your FMLA entitlement renews in ' + daysToRenew + ' days (' + fmlaRenewDate.toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}) + '). Contact HR to re-certify if needed.' });
      }
    }
    var daysSep = daysUntilSep1();
    if (daysSep <= 14 && daysSep > 0) alerts.push({ type: 'info', title: 'Work year ending', body: daysSep + ' days until September 1. Occasions reset then. Back up your data.' });
    var daysJan = daysUntilJan1();
    if (daysJan <= 14 && daysJan > 0) alerts.push({ type: 'info', title: 'Calendar year ending', body: daysJan + ' days until January 1. PL and family sick reset then.' });

    for (var i = 0; i < alerts.length; i++) {
      var a = alerts[i];
      var iconName = a.type === 'danger' ? 'warn' : a.type === 'warn' ? 'warn' : 'info';
      html += '<div class="alert alert-' + a.type + '"><span class="alert-icon">' + icons[iconName] + '</span><div class="alert-body"><div class="alert-title">' + escapeHtml(a.title) + '</div>' + escapeHtml(a.body) + '</div></div>';
    }
    return html;
  }

  // === Add Entry projection ===
  /* ── Time picker helpers ── */
  function fmtHM(decHrs) {
    var hr = Math.floor(decHrs), mn = Math.round((decHrs - hr) * 60);
    if (mn === 60) { hr++; mn = 0; }
    return (hr > 0 ? hr + 'h' : '') + (mn > 0 ? (hr > 0 ? ' ' : '') + (mn < 10 ? '0' : '') + mn + 'm' : '') || '0m';
  }

  function renderHoursPicker(idSuffix, currentVal) {
    var v = parseFloat(currentVal) || 0;
    var lbl = v > 0 ? fmtHM(v) : 'Tap to set time';
    return '<button class="time-picker-btn" id="tpbtn-' + idSuffix + '" type="button" data-action="open-time-picker" data-suffix="' + idSuffix + '">⏱ ' + lbl + '</button>';
  }

  function showTimePicker(initHrs, initMins, onConfirm) {
    // Calculator-style: digits shift left as you type (like a phone keypad)
    var modal = document.getElementById('modal');
    var h0 = Math.min(Math.max(Math.floor(initHrs), 0), 23);
    var m0 = Math.min(Math.max(Math.round(initMins), 0), 59);
    var inputDigits = h0 ? String(h0 * 100 + m0) : (m0 ? '0' + (m0 < 10 ? '0' : '') + m0 : '');
    function readTime() {
      if (!inputDigits) return { h: 0, m: 0 };
      var h = 0, m = 0;
      if (inputDigits.length === 1) {
        h = parseInt(inputDigits, 10) || 0;
      } else if (inputDigits.length === 2) {
        h = parseInt(inputDigits.charAt(0), 10) || 0;
        m = parseInt(inputDigits.charAt(1), 10) || 0;
      } else {
        h = parseInt(inputDigits.slice(0, -2), 10) || 0;
        m = parseInt(inputDigits.slice(-2), 10) || 0;
      }
      return { h: h, m: m };
    }
    function getH() { return readTime().h; }
    function getM() { return readTime().m; }
    function toDecimal() { return getH()+getM()/60; }
    function dispStr() { return getH()+':'+(getM()<10?'0':'')+getM(); }
    function hintStr() {
      var h = getH(), m = getM(), total = toDecimal();
      if (h === 0 && m === 0) return 'Type hours and minutes';
      return fmtHM(total) + ' selected';
    }
    function flashInvalid(msg) {
      var dEl = document.getElementById('calc-disp');
      var hEl = document.getElementById('calc-hint');
      if (hEl) hEl.textContent = msg;
      if (dEl) {
        dEl.classList.remove('tp-invalid');
        void dEl.offsetWidth;
        dEl.classList.add('tp-invalid');
        setTimeout(function(){ dEl.classList.remove('tp-invalid'); refreshDisp(); }, 240);
      }
    }
    function pushDigit(d) {
      var next = (inputDigits + String(d)).slice(-4);
      var prev = inputDigits;
      inputDigits = next;
      var t = readTime();
      inputDigits = prev;
      if (t.m > 59) { flashInvalid('Minutes must be 00-59'); return; }
      if (t.h > 23) { flashInvalid('Hours must be 0-23'); return; }
      inputDigits = next;
      refreshDisp();
    }
    function doBksp() { inputDigits = inputDigits.slice(0, -1); refreshDisp(); }
    function refreshDisp() {
      var el=document.getElementById('calc-disp'); if(!el) return;
      el.textContent=dispStr();
      el.style.color=(getH()===0&&getM()===0)?'var(--muted)':'var(--ot)';
      var hint=document.getElementById('calc-hint');
      if(hint) hint.textContent=hintStr();
    }
    function doConfirm() {
      var v=toDecimal(); modal.innerHTML='';
      document.removeEventListener('keydown',onCalcKey);
      onConfirm(parseFloat(v.toFixed(4)));
    }
    function doClose() { modal.innerHTML=''; document.removeEventListener('keydown',onCalcKey); }
    function onCalcKey(e) {
      if(e.key>='0'&&e.key<='9'){haptic('light');pushDigit(parseInt(e.key));e.preventDefault();}
      else if(e.key==='Backspace'){haptic('light');doBksp();e.preventDefault();}
      else if(e.key==='Enter'){haptic('success');doConfirm();e.preventDefault();}
      else if(e.key==='Escape'){doClose();e.preventDefault();}
    }
    var bs='padding:15px 0;font-size:20px;font-weight:600;border-radius:12px;width:100%;cursor:pointer;font-family:inherit;';
    var html='<div class="modal-backdrop" id="tp-backdrop" style="z-index:70">';
    html+='<div class="modal" data-stop="1" style="max-width:15rem;padding:16px 14px">';
    html+='<div id="calc-disp" style="text-align:center;font-size:52px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-0.03em;padding:8px 0 2px;color:var(--muted)">'+dispStr()+'</div>';
    html+='<div style="text-align:center;font-size:10px;color:var(--dim);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px">h : mm</div>';
    html+='<div id="calc-hint" style="text-align:center;font-size:12px;color:var(--muted);font-weight:600;margin:-5px 0 12px">'+hintStr()+'</div>';
    html+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:8px">';
    var rows2=[['1','2','3'],['4','5','6'],['7','8','9'],['⌫','0','✓']];
    for(var ri2=0;ri2<rows2.length;ri2++){
      for(var ci2=0;ci2<rows2[ri2].length;ci2++){
        var k2=rows2[ri2][ci2];
        if(k2==='✓'){
          html+='<button id="tp-set" style="'+bs+'background:var(--ot);color:white;border:none">✓</button>';
        } else if(k2==='⌫'){
          html+='<button id="tp-bk" style="'+bs+'background:var(--input-bg);border:1px solid var(--input-border);color:var(--text)">⌫</button>';
        } else {
          html+='<button class="cdk" data-d="'+k2+'" style="'+bs+'background:var(--input-bg);border:1px solid var(--input-border);color:var(--text)">'+k2+'</button>';
        }
      }
    }
    html+='</div>';
    html+='<button id="tp-cancel" style="width:100%;padding:10px;border-radius:10px;background:transparent;border:1px solid var(--input-border);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Cancel</button>';
    html+='</div></div>';
    modal.innerHTML=html; refreshDisp();
    document.addEventListener('keydown',onCalcKey);
    modal.querySelectorAll('.cdk').forEach(function(b2){
      b2.addEventListener('click',function(){haptic('light');pushDigit(parseInt(b2.getAttribute('data-d')));});
    });
    document.getElementById('tp-bk').addEventListener('click',function(){haptic('light');doBksp();});
    document.getElementById('tp-set').addEventListener('click',function(){haptic('success');doConfirm();});
    document.getElementById('tp-cancel').addEventListener('click',doClose);
    document.getElementById('tp-backdrop').addEventListener('click',function(e){if(e.target===this)doClose();});
  }

  function initAllPickers() { /* time picker now handled via data-action delegation */ }

  function bindCalendarSwipe() {
    var el = document.getElementById('calCard');
    if (!el || el._sw) return;
    el._sw = true;
    var sx, sy;
    el.addEventListener('touchstart', function(e) { sx = e.touches[0].clientX; sy = e.touches[0].clientY; }, { passive: true });
    el.addEventListener('touchend', function(e) {
      if (sx === undefined) return;
      var dx = e.changedTouches[0].clientX - sx;
      var dy = e.changedTouches[0].clientY - sy;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 44) {
        haptic('light');
        state.calMonth = new Date(state.calMonth.getFullYear(), state.calMonth.getMonth() + (dx < 0 ? 1 : -1));
        render();
      }
      sx = undefined;
    }, { passive: true });
  }

  function bindPanelDateInput() {
    var inp = document.getElementById('panelDate');
    if (!inp) return;
    inp.addEventListener('change', function() {
      if (!inp.value) return;
      state.selectedDate = parseDateKey(inp.value);
      // Suggest first unused type for the new date
      var dayEntries = getDateEntries(inp.value);
      var used = {};
      for (var ui = 0; ui < dayEntries.length; ui++) used[dayEntries[ui].type] = true;
      var nextT = 'ot'; var allTp = ['ot','vac','sick','fsick','pl','fmla','block'];
      for (var ni = 0; ni < allTp.length; ni++) { if (!used[allTp[ni]]) { nextT = allTp[ni]; break; } }
      state.editType = nextT;
      state.editHours = (nextT === 'ot' || nextT === 'block') ? '0' : String(WD());
      renderPanel();
      setTimeout(initAllPickers, 0);
    });
  }

  function bindInputFocusSelect() {
    document.querySelectorAll('.setting-input, .hours-input').forEach(function(inp) {
      if (!inp._fs) { inp._fs = true; inp.addEventListener('focus', function() { inp.select(); }); }
    });
  }

  function bindPanelFocusScroll() {
    var panel = document.querySelector('.panel');
    if (!panel) return;
    panel.querySelectorAll('input').forEach(function(inp) {
      inp.addEventListener('focus', function() {
        setTimeout(function() { try { inp.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); } catch(e){} }, 300);
      });

  function renderAddProjection() {
    if (state.addType === 'block') return '<div id="addProjection"></div>';
    var hours = parseFloat(state.addHours) || 0;
    if (hours <= 0) return '<div id="addProjection"></div>';

    // For range mode, sum hours across all days for the projection check
    var dayCount = 1;
    if (state.addMode === 'range') {
      var s = parseDateKey(state.addDateStart);
      var e = parseDateKey(state.addDateEnd);
      dayCount = Math.max(1, daysBetween(s, e) + 1);
    }
    var totalHours = hours * dayCount;

    var result = checkEntry(state.addType, totalHours, state.addDateStart);
    var cls = result.blocks.length ? 'danger' : result.warns.length ? 'warn' : 'ok';
    var html = '<div id="addProjection" class="projection ' + cls + '">';
    for (var i = 0; i < result.blocks.length; i++) html += '<span class="projection-line"><strong>BLOCKED:</strong> ' + escapeHtml(result.blocks[i]) + '</span>';
    for (var j = 0; j < result.warns.length; j++) html += '<span class="projection-line"><strong>Warning:</strong> ' + escapeHtml(result.warns[j]) + '</span>';
    for (var k = 0; k < result.info.length; k++) html += '<span class="projection-line">' + escapeHtml(result.info[k]) + '</span>';
    html += '</div>';
    return html;
  }

    } else {

      html += '<input class="date-input" type="date" id="addDateStart" value="' + escapeHtml(state.addDateStart) + '">';
      html += '<input class="date-input" type="date" id="addDateEnd" value="' + escapeHtml(state.addDateEnd) + '">';

  function renderEditProjection() {
    if (!state.selectedDate) return '<div id="editProjection"></div>';

    var hrs = parseFloat(state.editHours) || 0;
    if (hrs <= 0) return '<div id="editProjection"></div>';
    var key = formatDateKey(state.selectedDate);
    var r = checkEntry(state.editType, hrs, key);
    var cls = r.blocks.length ? 'danger' : r.warns.length ? 'warn' : 'ok';
    var html = '<div id="editProjection" class="projection ' + cls + '">';
    for (var i = 0; i < r.blocks.length; i++) html += '<span class="projection-line"><strong>BLOCKED:</strong> ' + escapeHtml(r.blocks[i]) + '</span>';
    for (var jj = 0; jj < r.warns.length; jj++) html += '<span class="projection-line"><strong>Warning:</strong> ' + escapeHtml(r.warns[jj]) + '</span>';
    for (var kk = 0; kk < r.info.length; kk++) html += '<span class="projection-line">' + escapeHtml(r.info[kk]) + '</span>';
