<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>Overtime Tracker</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #0a0a0a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overscroll-behavior-y: none; }
  body.light { background: #f5f6f8; color: #0f172a; }

  /* Theme variables */
  body { --bg: #0a0a0a; --card: #13151a; --border: rgba(255,255,255,0.06); --text: #fff; --muted: #94a3b8; --dim: #64748b; --input-bg: #1a1d24; --input-border: rgba(255,255,255,0.06); --nav-bg: #0a0a0a; --cell-bg: rgba(255,255,255,0.02); --bar-bg: rgba(255,255,255,0.05); }
  body.light { --bg: #f5f6f8; --card: #ffffff; --border: #e2e8f0; --text: #0f172a; --muted: #64748b; --dim: #94a3b8; --input-bg: #f1f5f9; --input-border: #e2e8f0; --nav-bg: #ffffff; --cell-bg: #f8fafc; --bar-bg: #e2e8f0; }

  .app { min-height: 100vh; background: var(--bg); color: var(--text); padding-bottom: calc(env(safe-area-inset-bottom) + 90px); }
  .container { max-width: 28rem; margin: 0 auto; padding: 16px; }

  /* Typography */
  h1 { font-size: 36px; font-weight: 700; margin: 4px 0 0 0; letter-spacing: -0.02em; }
  .greeting { font-size: 14px; color: var(--muted); }
  .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--dim); font-weight: 600; }
  .muted { color: var(--muted); }
  .dim { color: var(--dim); }
  .num { font-variant-numeric: tabular-nums; }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; padding-top: 8px; }
  .header-buttons { display: flex; gap: 8px; }
  .icon-btn { width: 44px; height: 44px; border-radius: 16px; background: var(--card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text); cursor: pointer; padding: 0; }
  .icon-btn:active { transform: scale(0.96); }

  /* Cards */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 16px; }
  .card-lg { border-radius: 24px; padding: 24px; }
  .card-mb { margin-bottom: 20px; }
  .card-mb-sm { margin-bottom: 16px; }

  /* Chips row */
  .chips { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .chip { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 12px; display: flex; align-items: center; gap: 12px; }
  .chip-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .chip-amber { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
  .chip-emerald { background: rgba(16, 185, 129, 0.15); color: #10b981; animation: pulseRing 2s infinite; }
  .chip-text-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--dim); font-weight: 600; }
  .chip-text-value { font-size: 14px; font-weight: 600; color: var(--text); margin-top: 2px; }

  /* Big number */
  .big-num { font-size: 60px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; }
  .big-unit { font-size: 18px; color: var(--muted); }

  /* Progress bar */
  .progress-track { height: 8px; background: var(--bar-bg); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(to right, #10b981, #34d399); border-radius: 4px; transition: width 0.7s; }

  /* Grid stats */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Buttons */
  .btn { padding: 12px 16px; border-radius: 14px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text); font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: #10b981; color: white; border-color: #10b981; padding: 16px; font-weight: 600; font-size: 15px; border-radius: 16px; width: 100%; }
  .btn-amber { background: rgba(245, 158, 11, 0.15); color: #f59e0b; border-color: rgba(245, 158, 11, 0.3); font-weight: 600; }
  .btn-row { display: flex; gap: 8px; }
  .small-btn { width: 36px; height: 36px; border-radius: 12px; background: var(--input-bg); border: 1px solid var(--input-border); display: flex; align-items: center; justify-content: center; color: var(--text); cursor: pointer; padding: 0; }
  .small-btn:active { transform: scale(0.96); }

  /* Period card top */
  .period-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .period-range { font-size: 16px; font-weight: 500; color: var(--text); }
  .nav-row { display: flex; gap: 4px; }

  /* Calendar */
  .cal-grid-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 8px; }
  .cal-day-name { text-align: center; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--dim); font-weight: 600; padding: 4px 0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .cal-cell { aspect-ratio: 1; border-radius: 12px; border: 1px solid var(--border); background: var(--cell-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; padding: 0; color: var(--text); font-family: inherit; }
  .cal-cell:active { transform: scale(0.94); }
  .cal-cell-num { font-size: 14px; font-weight: 500; }
  .cal-cell-sub { font-size: 9px; font-weight: 700; margin-top: 2px; }
  .cal-cell.logged { background: rgba(16, 185, 129, 0.15); border-color: rgba(16, 185, 129, 0.3); }
  .cal-cell.logged .cal-cell-sub { color: #10b981; }
  .cal-cell.blocked { background: rgba(245, 158, 11, 0.15); border-color: rgba(245, 158, 11, 0.3); }
  .cal-cell.blocked .cal-cell-num, .cal-cell.blocked .cal-cell-sub { color: #f59e0b; }
  .cal-cell.in-period { border-color: rgba(16, 185, 129, 0.3); }
  .cal-cell.today { border: 2px solid #10b981; }
  .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .cal-month { font-size: 18px; font-weight: 600; color: var(--text); }

  /* Bottom nav */
  .nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--nav-bg); border-top: 1px solid var(--border); z-index: 40; padding-bottom: env(safe-area-inset-bottom); }
  .nav-inner { max-width: 28rem; margin: 0 auto; display: flex; justify-content: space-around; align-items: center; padding: 8px; }
  .nav-btn { flex: 1; background: none; border: none; padding: 8px 4px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; color: var(--dim); font-family: inherit; }
  .nav-btn:active { transform: scale(0.96); }
  .nav-icon-wrap { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
  .nav-btn.active { color: #10b981; }
  .nav-btn.active .nav-icon-wrap { background: rgba(16, 185, 129, 0.1); }
  body.light .nav-btn.active .nav-icon-wrap { background: #ecfdf5; }
  .nav-label { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; }

  /* Edit panel */
  .panel-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 50; display: flex; align-items: flex-end; animation: fadeIn 0.2s ease; }
  .panel { position: relative; width: 100%; max-width: 28rem; margin: 0 auto; background: var(--card); border: 1px solid var(--border); border-radius: 24px 24px 0 0; padding: 20px; padding-bottom: calc(env(safe-area-inset-bottom) + 24px); animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .panel-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
  .panel-date { font-size: 18px; font-weight: 700; color: var(--text); margin-top: 4px; }
  .panel-input { width: 100%; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 16px; padding: 16px; font-size: 30px; font-weight: 700; color: var(--text); text-align: center; font-variant-numeric: tabular-nums; outline: none; font-family: inherit; -webkit-appearance: none; -moz-appearance: textfield; }
  .panel-input::-webkit-outer-spin-button, .panel-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .quick-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
  .quick-btn { padding: 10px; border-radius: 12px; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .quick-btn:active { transform: scale(0.96); }
  .panel-existing { background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 12px; padding: 12px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
  .panel-existing-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--dim); }
  .panel-existing-value { font-size: 14px; font-weight: 600; }

  /* Toast */
  .toast-wrap { position: fixed; top: 16px; left: 0; right: 0; display: flex; justify-content: center; padding: 0 16px; z-index: 100; pointer-events: none; }
  .toast { padding: 12px 20px; border-radius: 16px; font-size: 14px; font-weight: 500; box-shadow: 0 10px 25px rgba(0,0,0,0.3); animation: slideDown 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .toast-success { background: #10b981; color: white; }
  .toast-error { background: #ef4444; color: white; }

  /* Log entries */
  .log-list { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
  .log-item { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 16px; background: none; border: none; text-align: left; cursor: pointer; color: var(--text); font-family: inherit; }
  .log-item + .log-item { border-top: 1px solid var(--border); }
  .log-date { font-size: 14px; font-weight: 500; color: var(--text); }
  .log-period { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .log-value { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .log-value.hours { color: #10b981; }
  .log-value.blocked { color: #f59e0b; }

  /* Reports */
  .report-row { margin-bottom: 12px; }
  .report-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; }
  .report-bar-track { height: 10px; background: var(--bar-bg); border-radius: 5px; overflow: hidden; }
  .report-bar-fill { height: 100%; background: linear-gradient(to right, #10b981, #34d399); border-radius: 5px; transition: width 0.7s; }

  /* Settings */
  .theme-row { display: flex; gap: 8px; }
  .theme-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text); font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .theme-btn.active { background: #10b981; border-color: #10b981; color: white; }
  .legend { display: flex; align-items: center; gap: 16px; font-size: 12px; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-swatch { width: 12px; height: 12px; border-radius: 4px; }
  .legend-swatch.logged { background: rgba(16, 185, 129, 0.3); border: 1px solid rgba(16, 185, 129, 0.3); }
  .legend-swatch.blocked { background: rgba(245, 158, 11, 0.3); border: 1px solid rgba(245, 158, 11, 0.3); }
  .legend-swatch.today { border: 2px solid #10b981; }

  .section { margin-bottom: 20px; }
  .section-title { margin-bottom: 12px; }
  .pad { padding: 16px; }
  .pad-tb { padding: 16px 0; }
  .border-b { border-bottom: 1px solid var(--border); }
  .flex { display: flex; }
  .flex-between { display: flex; justify-content: space-between; align-items: center; }
  .gap-2 { gap: 8px; }
  .mt-1 { margin-top: 4px; }
  .mt-2 { margin-top: 8px; }
  .mt-4 { margin-top: 16px; }
  .mb-2 { margin-bottom: 8px; }
  .mb-4 { margin-bottom: 16px; }
  .mb-5 { margin-bottom: 20px; }
  .text-sm { font-size: 14px; }
  .text-xs { font-size: 12px; }
  .text-2xl { font-size: 24px; font-weight: 700; }
  .text-center { text-align: center; }
  .py-6 { padding: 24px 0; }

  /* Animations */
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes slideDown { from { transform: translateY(-40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pulseRing { 0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); } }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="app">
  <div class="container">
    <div class="header">
      <div>
        <div class="greeting" id="greeting">Good evening, David</div>
        <h1>Overtime</h1>
      </div>
      <div class="header-buttons">
        <button class="icon-btn" id="themeBtn" aria-label="Theme"></button>
        <button class="icon-btn" id="settingsBtn" aria-label="Settings"></button>
      </div>
    </div>
    <div id="content"></div>
  </div>
  <div class="nav">
    <div class="nav-inner" id="nav"></div>
  </div>
  <div id="panel"></div>
  <div id="toast"></div>
  <input type="file" id="fileInput" accept=".json" style="display:none">
</div>

<script>
(function() {
  'use strict';

  // === State ===
  var STORAGE_KEY = 'overtime-tracker-v1-data';
  var THEME_KEY = 'overtime-tracker-v1-theme';
  var START_DATE = new Date(2026, 4, 15);
  var MS_PER_DAY = 86400000;

  var state = {
    theme: 'dark',
    data: {},
    tab: 'home',
    calMonth: new Date(),
    activePeriod: 0,
    selectedDate: null,
    hoursInput: ''
  };

  try { state.theme = localStorage.getItem(THEME_KEY) || 'dark'; } catch (e) {}
  try {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      var parsed = JSON.parse(saved);
      state.data = parsed && parsed.version === 1 ? parsed.data : (parsed || {});
    }
  } catch (e) { state.data = {}; }
  state.activePeriod = getPayPeriod(new Date());

  // === Helpers ===
  function formatDateKey(d) {
    var y = d.getFullYear();
    var m = String(d.getMonth() + 1);
    if (m.length < 2) m = '0' + m;
    var day = String(d.getDate());
    if (day.length < 2) day = '0' + day;
    return y + '-' + m + '-' + day;
  }
  function parseDateKey(k) {
    var p = k.split('-');
    return new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2]));
  }
  function getPayPeriod(d) {
    return Math.floor(Math.floor((d - START_DATE) / MS_PER_DAY) / 14);
  }
  function getPeriodStart(i) { return new Date(START_DATE.getTime() + i * 14 * MS_PER_DAY); }
  function getPeriodEnd(i) { return new Date(START_DATE.getTime() + (i * 14 + 13) * MS_PER_DAY); }
  function formatPeriodRange(i) {
    var s = getPeriodStart(i), e = getPeriodEnd(i);
    var opts = { month: 'short', day: 'numeric' };
    return s.toLocaleDateString('en-US', opts) + ' - ' + e.toLocaleDateString('en-US', opts);
  }
  function haptic(style) {
    try {
      if (navigator.vibrate) {
        var p = { light: 10, medium: 20, heavy: 30, success: [10, 30, 10] };
        navigator.vibrate(p[style || 'light'] || 10);
      }
    } catch (e) {}
  }
  function saveData() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ version: 1, data: state.data })); } catch (e) {}
  }
  function escapeHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // === Icons (SVG strings) ===
  var icons = {
    home: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',
    calendar: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
    list: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>',
    chart: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>',
    sun: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>',
    moon: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>',
    settings: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
    chevLeft: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>',
    chevRight: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>',
    download: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
    upload: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>',
    x: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/></svg>',
    trash: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
    block: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>',
    clock: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
    target: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>'
  };

  // === Toast ===
  var toastTimer = null;
  function showToast(msg, type) {
    var el = document.getElementById('toast');
    el.innerHTML = '<div class="toast-wrap"><div class="toast ' + (type === 'error' ? 'toast-error' : 'toast-success') + '">' + escapeHtml(msg) + '</div></div>';
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { el.innerHTML = ''; }, 2500);
  }

  // === Theme ===
  function applyTheme() {
    document.body.classList.toggle('light', state.theme === 'light');
    var meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute('content', state.theme === 'dark' ? '#0a0a0a' : '#f5f6f8');
    try { localStorage.setItem(THEME_KEY, state.theme); } catch (e) {}
    document.getElementById('themeBtn').innerHTML = state.theme === 'dark' ? icons.moon : icons.sun;
  }

  // === Greeting ===
  function setGreeting() {
    var h = new Date().getHours();
    var g = h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
    document.getElementById('greeting').textContent = g + ', David';
  }

  // === Derived stats ===
  function getPeriodTotal() {
    var sum = 0;
    for (var k in state.data) {
      var v = state.data[k];
      if (typeof v === 'number' && getPayPeriod(parseDateKey(k)) === state.activePeriod) sum += v;
    }
    return sum;
  }
  function getAllTime() {
    var sum = 0;
    for (var k in state.data) if (typeof state.data[k] === 'number') sum += state.data[k];
    return sum;
  }
  function getDaysLogged() {
    var c = 0;
    for (var k in state.data) if (typeof state.data[k] === 'number') c++;
    return c;
  }
  function getPeriodProgress() {
    var start = getPeriodStart(state.activePeriod);
    var diff = Math.floor((new Date() - start) / MS_PER_DAY) + 1;
    return Math.max(0, Math.min(14, diff));
  }

  // === Render: Home ===
  function renderHome() {
    var todayKey = formatDateKey(new Date());
    var todayHours = typeof state.data[todayKey] === 'number' ? state.data[todayKey] : 0;
    var progress = getPeriodProgress();
    var daysLeft = 14 - progress;
    var periodTotal = getPeriodTotal();
    var allTime = getAllTime();
    var daysLogged = getDaysLogged();

    return ''
      + '<div class="chips">'
        + '<div class="chip"><div class="chip-icon chip-amber">' + icons.clock + '</div><div><div class="chip-text-label">Today</div><div class="chip-text-value">' + todayHours + ' hrs</div></div></div>'
        + '<div class="chip"><div class="chip-icon chip-emerald">' + icons.target + '</div><div><div class="chip-text-label">Period ends</div><div class="chip-text-value">' + (daysLeft > 0 ? daysLeft + ' days' : 'Today') + '</div></div></div>'
      + '</div>'
      + '<div class="card card-lg card-mb">'
        + '<div class="label" style="margin-bottom:4px">Current Pay Period</div>'
        + '<div class="period-head"><div class="period-range">' + formatPeriodRange(state.activePeriod) + '</div>'
          + '<div class="nav-row">'
            + '<button class="small-btn" data-action="prev-period">' + icons.chevLeft + '</button>'
            + '<button class="small-btn" data-action="next-period">' + icons.chevRight + '</button>'
          + '</div>'
        + '</div>'
        + '<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:8px"><div class="big-num">' + periodTotal.toFixed(1) + '</div><div class="big-unit">hrs</div></div>'
        + '<div class="text-sm muted mb-5">Day ' + progress + ' of 14</div>'
        + '<div class="progress-track"><div class="progress-fill" style="width:' + ((progress / 14) * 100) + '%"></div></div>'
      + '</div>'
      + '<div class="grid-2 mb-5">'
        + '<div class="card"><div class="label mb-2">All Time</div><div class="text-2xl num">' + allTime.toFixed(1) + '</div><div class="text-xs muted mt-1">hours logged</div></div>'
        + '<div class="card"><div class="label mb-2">Days Logged</div><div class="text-2xl num">' + daysLogged + '</div><div class="text-xs muted mt-1">across all periods</div></div>'
      + '</div>'
      + '<div class="card card-mb">'
        + '<div class="label" style="margin-bottom:12px">Backup</div>'
        + '<div class="btn-row">'
          + '<button class="btn" style="flex:1" data-action="export">' + icons.download + ' Export</button>'
          + '<button class="btn" style="flex:1" data-action="import">' + icons.upload + ' Import</button>'
        + '</div>'
      + '</div>';
  }

  // === Render: Calendar ===
  function renderCalendar() {
    var firstDay = new Date(state.calMonth.getFullYear(), state.calMonth.getMonth(), 1);
    var lastDay = new Date(state.calMonth.getFullYear(), state.calMonth.getMonth() + 1, 0);
    var todayStr = formatDateKey(new Date());

    var html = ''
      + '<div class="card card-mb-sm">'
        + '<div class="flex-between">'
          + '<div>'
            + '<div class="label">Active Period</div>'
            + '<div class="period-range">' + formatPeriodRange(state.activePeriod) + '</div>'
            + '<div class="text-sm muted mt-1">' + getPeriodTotal().toFixed(1) + ' hrs logged</div>'
          + '</div>'
          + '<div class="nav-row">'
            + '<button class="small-btn" data-action="prev-period">' + icons.chevLeft + '</button>'
            + '<button class="small-btn" data-action="next-period">' + icons.chevRight + '</button>'
          + '</div>'
        + '</div>'
      + '</div>'
      + '<div class="card card-lg card-mb">'
        + '<div class="cal-header">'
          + '<button class="small-btn" data-action="prev-month">' + icons.chevLeft + '</button>'
          + '<div class="cal-month">' + state.calMonth.toLocaleString('en-US', { month: 'long', year: 'numeric' }) + '</div>'
          + '<button class="small-btn" data-action="next-month">' + icons.chevRight + '</button>'
        + '</div>'
        + '<div class="cal-grid-days">';

    var names = ['S','M','T','W','T','F','S'];
    for (var i = 0; i < 7; i++) html += '<div class="cal-day-name">' + names[i] + '</div>';
    html += '</div><div class="cal-grid">';

    for (var b = 0; b < firstDay.getDay(); b++) html += '<div></div>';
    for (var d = 1; d <= lastDay.getDate(); d++) {
      var date = new Date(state.calMonth.getFullYear(), state.calMonth.getMonth(), d);
      var key = formatDateKey(date);
      var val = state.data[key];
      var inActive = getPayPeriod(date) === state.activePeriod;
      var isToday = key === todayStr;
      var isBlocked = val === 'BLOCKED';
      var hasHours = typeof val === 'number' && val > 0;

      var classes = ['cal-cell'];
      if (isBlocked) classes.push('blocked');
      else if (hasHours) classes.push('logged');
      if (inActive && !isBlocked && !hasHours) classes.push('in-period');
      if (isToday) classes.push('today');

      html += '<button class="' + classes.join(' ') + '" data-action="day" data-date="' + key + '">'
        + '<span class="cal-cell-num">' + d + '</span>'
        + (hasHours ? '<span class="cal-cell-sub">' + val + 'h</span>' : '')
        + (isBlocked ? '<span class="cal-cell-sub">OFF</span>' : '')
        + '</button>';
    }
    html += '</div></div>'
      + '<div class="card card-mb">'
        + '<div class="legend">'
          + '<div class="legend-item"><div class="legend-swatch logged"></div>Logged</div>'
          + '<div class="legend-item"><div class="legend-swatch blocked"></div>Blocked</div>'
          + '<div class="legend-item"><div class="legend-swatch today"></div>Today</div>'
        + '</div>'
      + '</div>';

    return html;
  }

  // === Render: Log ===
  function renderLog() {
    var entries = [];
    for (var k in state.data) {
      var v = state.data[k];
      if (typeof v === 'number' || v === 'BLOCKED') entries.push({ key: k, date: parseDateKey(k), value: v });
    }
    entries.sort(function(a, b) { return b.date - a.date; });

    var html = '<div class="card card-mb-sm"><div class="label">Total Entries</div><div class="text-2xl num mt-1">' + entries.length + '</div></div>';
    if (entries.length === 0) {
      html += '<div class="card card-mb text-center" style="padding:32px"><div class="text-sm muted">No entries yet. Tap a day on the calendar to start.</div></div>';
    } else {
      html += '<div class="log-list">';
      for (var i = 0; i < entries.length; i++) {
        var e = entries[i];
        var dateStr = e.date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
        var periodStr = formatPeriodRange(getPayPeriod(e.date));
        var valStr = e.value === 'BLOCKED' ? 'OFF' : e.value + 'h';
        var valCls = e.value === 'BLOCKED' ? 'blocked' : 'hours';
        html += '<button class="log-item" data-action="log-item" data-date="' + e.key + '">'
          + '<div><div class="log-date">' + dateStr + '</div><div class="log-period">' + periodStr + '</div></div>'
          + '<div class="log-value ' + valCls + '">' + valStr + '</div>'
          + '</button>';
      }
      html += '</div>';
    }
    return html;
  }

  // === Render: Reports ===
  function renderReports() {
    var totals = {};
    for (var k in state.data) {
      var v = state.data[k];
      if (typeof v !== 'number') continue;
      var p = getPayPeriod(parseDateKey(k));
      totals[p] = (totals[p] || 0) + v;
    }
    var arr = [];
    for (var p in totals) arr.push({ period: parseInt(p), total: totals[p] });
    arr.sort(function(a, b) { return b.period - a.period; });

    var max = 1;
    for (var i = 0; i < arr.length; i++) if (arr[i].total > max) max = arr[i].total;
    var avg = arr.length ? arr.reduce(function(a, b) { return a + b.total; }, 0) / arr.length : 0;

    var html = '<div class="grid-2 mb-5">'
      + '<div class="card"><div class="label mb-2">Avg per Period</div><div class="text-2xl num">' + avg.toFixed(1) + '</div><div class="text-xs muted mt-1">hours</div></div>'
      + '<div class="card"><div class="label mb-2">Periods Tracked</div><div class="text-2xl num">' + arr.length + '</div><div class="text-xs muted mt-1">with hours</div></div>'
      + '</div>'
      + '<div class="card card-lg card-mb"><div class="label mb-4">Hours by Period</div>';
    if (arr.length === 0) {
      html += '<div class="text-sm muted text-center py-6">No data yet.</div>';
    } else {
      for (var i = 0; i < Math.min(arr.length, 10); i++) {
        var pt = arr[i];
        html += '<div class="report-row">'
          + '<div class="report-label"><span class="muted">' + formatPeriodRange(pt.period) + '</span><span class="num" style="font-weight:600">' + pt.total.toFixed(1) + 'h</span></div>'
          + '<div class="report-bar-track"><div class="report-bar-fill" style="width:' + ((pt.total / max) * 100) + '%"></div></div>'
          + '</div>';
      }
    }
    html += '</div>';
    return html;
  }

  // === Render: Settings ===
  function renderSettings() {
    return ''
      + '<div class="card card-mb-sm" style="padding:0;overflow:hidden">'
        + '<div class="pad border-b"><div class="label mb-2">Theme</div>'
          + '<div class="theme-row">'
            + '<button class="theme-btn ' + (state.theme === 'dark' ? 'active' : '') + '" data-action="theme-dark">Dark</button>'
            + '<button class="theme-btn ' + (state.theme === 'light' ? 'active' : '') + '" data-action="theme-light">Light</button>'
          + '</div>'
        + '</div>'
        + '<div class="pad"><div class="label mb-2">Pay Period Anchor</div><div class="text-sm">May 15, 2026</div><div class="text-xs muted mt-1">14-day periods roll from this date</div></div>'
      + '</div>'
      + '<div class="card card-mb-sm">'
        + '<div class="label" style="margin-bottom:12px">Backup</div>'
        + '<div class="btn-row">'
          + '<button class="btn" style="flex:1" data-action="export">' + icons.download + ' Export JSON</button>'
          + '<button class="btn" style="flex:1" data-action="import">' + icons.upload + ' Import JSON</button>'
        + '</div>'
      + '</div>'
      + '<div class="card card-mb"><div class="label mb-2">About</div><div class="text-sm">Overtime Tracker</div><div class="text-xs muted mt-1">Local-only. Your data stays on this device.</div></div>';
  }

  // === Render: Nav ===
  function renderNav() {
    var items = [
      { id: 'home', label: 'HOME', icon: icons.home },
      { id: 'calendar', label: 'CALENDAR', icon: icons.calendar },
      { id: 'log', label: 'LOG', icon: icons.list },
      { id: 'reports', label: 'REPORTS', icon: icons.chart }
    ];
    var html = '';
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      var active = state.tab === it.id ? ' active' : '';
      html += '<button class="nav-btn' + active + '" data-action="tab" data-tab="' + it.id + '">'
        + '<div class="nav-icon-wrap">' + it.icon + '</div>'
        + '<span class="nav-label">' + it.label + '</span>'
        + '</button>';
    }
    document.getElementById('nav').innerHTML = html;
  }

  // === Edit panel ===
  function renderPanel() {
    var el = document.getElementById('panel');
    if (!state.selectedDate) { el.innerHTML = ''; return; }
    var key = formatDateKey(state.selectedDate);
    var existing = state.data[key];
    var dateStr = state.selectedDate.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
    var existingHtml = '';
    if (existing !== undefined) {
      var valStr = existing === 'BLOCKED' ? 'BLOCKED' : existing + ' hrs';
      var color = existing === 'BLOCKED' ? '#f59e0b' : '#10b981';
      existingHtml = '<div class="panel-existing"><span class="panel-existing-label">Current</span><span class="panel-existing-value" style="color:' + color + '">' + valStr + '</span></div>';
    }
    el.innerHTML = ''
      + '<div class="panel-backdrop" data-action="close-panel">'
        + '<div class="panel" data-stop="1">'
          + '<div class="panel-head">'
            + '<div><div class="label">Editing</div><div class="panel-date">' + dateStr + '</div></div>'
            + '<button class="small-btn" data-action="close-panel">' + icons.x + '</button>'
          + '</div>'
          + existingHtml
          + '<div class="mb-4"><div class="label mb-2">Hours</div>'
            + '<input class="panel-input" type="number" inputmode="decimal" step="0.25" min="0" placeholder="0.0" id="hoursInput" value="' + escapeHtml(state.hoursInput) + '">'
          + '</div>'
          + '<div class="quick-row">'
            + '<button class="quick-btn" data-action="quick" data-val="1">1h</button>'
            + '<button class="quick-btn" data-action="quick" data-val="2">2h</button>'
            + '<button class="quick-btn" data-action="quick" data-val="4">4h</button>'
            + '<button class="quick-btn" data-action="quick" data-val="8">8h</button>'
          + '</div>'
          + '<button class="btn btn-primary" data-action="save">Save</button>'
          + '<div class="btn-row mt-2">'
            + '<button class="btn btn-amber" style="flex:1" data-action="block">' + icons.block + ' Block Day</button>'
            + '<button class="btn" style="flex:1" data-action="clear">' + icons.trash + ' Clear</button>'
          + '</div>'
        + '</div>'
      + '</div>';

    // Focus input
    setTimeout(function() {
      var inp = document.getElementById('hoursInput');
      if (inp) inp.focus();
    }, 50);
  }

  // === Main render ===
  function render() {
    var content = document.getElementById('content');
    if (state.tab === 'home') content.innerHTML = renderHome();
    else if (state.tab === 'calendar') content.innerHTML = renderCalendar();
    else if (state.tab === 'log') content.innerHTML = renderLog();
    else if (state.tab === 'reports') content.innerHTML = renderReports();
    else if (state.tab === 'settings') content.innerHTML = renderSettings();
    renderNav();
    renderPanel();
  }

  // === Actions ===
  function handleAction(action, el) {
    if (action === 'tab') {
      haptic('light');
      state.tab = el.getAttribute('data-tab');
      render();
    } else if (action === 'prev-period') {
      haptic('light');
      state.activePeriod--;
      render();
    } else if (action === 'next-period') {
      haptic('light');
      state.activePeriod++;
      render();
    } else if (action === 'prev-month') {
      haptic('light');
      state.calMonth = new Date(state.calMonth.getFullYear(), state.calMonth.getMonth() - 1);
      render();
    } else if (action === 'next-month') {
      haptic('light');
      state.calMonth = new Date(state.calMonth.getFullYear(), state.calMonth.getMonth() + 1);
      render();
    } else if (action === 'day') {
      haptic('light');
      var k = el.getAttribute('data-date');
      state.selectedDate = parseDateKey(k);
      var v = state.data[k];
      state.hoursInput = typeof v === 'number' ? String(v) : '';
      renderPanel();
    } else if (action === 'log-item') {
      haptic('light');
      var k2 = el.getAttribute('data-date');
      state.selectedDate = parseDateKey(k2);
      var v2 = state.data[k2];
      state.hoursInput = typeof v2 === 'number' ? String(v2) : '';
      state.tab = 'calendar';
      render();
    } else if (action === 'close-panel') {
      state.selectedDate = null;
      renderPanel();
    } else if (action === 'quick') {
      haptic('light');
      state.hoursInput = el.getAttribute('data-val');
      var inp = document.getElementById('hoursInput');
      if (inp) inp.value = state.hoursInput;
    } else if (action === 'save') {
      var inp2 = document.getElementById('hoursInput');
      var parsed = parseFloat(inp2 ? inp2.value : state.hoursInput);
      if (isNaN(parsed) || parsed < 0) {
        showToast('Enter a valid number', 'error');
        haptic('heavy');
        return;
      }
      var key = formatDateKey(state.selectedDate);
      state.data[key] = parsed;
      saveData();
      haptic('success');
      showToast('Saved ' + parsed + ' hrs');
      state.selectedDate = null;
      state.hoursInput = '';
      render();
    } else if (action === 'block') {
      var key3 = formatDateKey(state.selectedDate);
      state.data[key3] = 'BLOCKED';
      saveData();
      haptic('medium');
      showToast('Day blocked');
      state.selectedDate = null;
      state.hoursInput = '';
      render();
    } else if (action === 'clear') {
      var key4 = formatDateKey(state.selectedDate);
      delete state.data[key4];
      saveData();
      haptic('medium');
      showToast('Day cleared');
      state.selectedDate = null;
      state.hoursInput = '';
      render();
    } else if (action === 'export') {
      try {
        var payload = { version: 1, exportedAt: new Date().toISOString(), data: state.data };
        var blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        var url = URL.createObjectURL(blob);
        var link = document.createElement('a');
        var stamp = new Date().toISOString().slice(0, 10);
        link.href = url;
        link.download = 'overtime-backup-' + stamp + '.json';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
        haptic('success');
        showToast('Backup downloaded');
      } catch (err) {
        showToast('Export failed', 'error');
      }
    } else if (action === 'import') {
      document.getElementById('fileInput').click();
    } else if (action === 'theme-dark') {
      haptic('light');
      state.theme = 'dark';
      applyTheme();
      render();
    } else if (action === 'theme-light') {
      haptic('light');
      state.theme = 'light';
      applyTheme();
      render();
    }
  }

  // === Wire up events ===
  document.addEventListener('click', function(e) {
    var target = e.target;
    // Walk up to find element with data-action
    var el = target;
    while (el && el !== document.body && !el.getAttribute) el = el.parentNode;
    while (el && el !== document.body) {
      if (el.getAttribute && el.getAttribute('data-action')) {
        var action = el.getAttribute('data-action');
        // For panel close, only fire if clicking backdrop, not panel itself
        if (action === 'close-panel' && el.getAttribute('data-stop')) return;
        // Check if this click was inside a stopped element
        if (action === 'close-panel') {
          var check = target;
          while (check && check !== el) {
            if (check.getAttribute && check.getAttribute('data-stop')) {
              // Clicked inside panel, but the element itself has close-panel? Only if it's the X button
              if (target.closest && target.closest('[data-action="close-panel"]')) {
                // The button itself
                if (!target.closest('[data-stop]') || target.closest('button[data-action="close-panel"]')) {
                  handleAction(action, el);
                  return;
                }
              }
              return;
            }
            check = check.parentNode;
          }
        }
        handleAction(action, el);
        return;
      }
      el = el.parentNode;
    }
  });

  // Input change for hours
  document.addEventListener('input', function(e) {
    if (e.target && e.target.id === 'hoursInput') {
      state.hoursInput = e.target.value;
    }
  });

  // Enter key in hours input
  document.addEventListener('keydown', function(e) {
    if (e.target && e.target.id === 'hoursInput' && e.key === 'Enter') {
      handleAction('save', e.target);
    }
  });

  // File input
  document.getElementById('fileInput').addEventListener('change', function(e) {
    var file = e.target.files[0];
    e.target.value = '';
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var imported = JSON.parse(ev.target.result);
        var raw = imported.data || imported;
        if (typeof raw !== 'object' || raw === null || Array.isArray(raw)) throw new Error('bad shape');
        var hasExisting = Object.keys(state.data).length > 0;
        if (hasExisting && !confirm('This will replace your current data. Continue?')) return;
        state.data = raw;
        saveData();
        haptic('success');
        showToast('Imported ' + Object.keys(raw).length + ' entries');
        render();
      } catch (err) {
        showToast('Invalid backup file', 'error');
        haptic('heavy');
      }
    };
    reader.onerror = function() { showToast('Could not read file', 'error'); };
    reader.readAsText(file);
  });

  // === Init ===
  document.getElementById('settingsBtn').innerHTML = icons.settings;
  document.getElementById('settingsBtn').addEventListener('click', function() {
    haptic('light');
    state.tab = 'settings';
    render();
  });
  document.getElementById('themeBtn').addEventListener('click', function() {
    haptic('light');
    state.theme = state.theme === 'dark' ? 'light' : 'dark';
    applyTheme();
    render();
  });

  applyTheme();
  setGreeting();
  render();
})();
</script>
</body>
</html>
